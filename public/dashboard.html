<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>CodeDeck</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d0d;--sf:#161616;--bd:#252525;--tx:#e0e0e0;--tx2:#666;--ac:#7c6cf0;--ac2:#a89cf0;--gn:#22c55e;--rd:#ef4444;--yw:#eab308}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Courier New',monospace}
body{display:flex;flex-direction:column}
#tb{height:36px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;justify-content:space-between;flex-shrink:0}
#tbl{font-size:13px;font-weight:700;color:var(--gn)}
#tbr{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--tx2)}
#tbr button{padding:2px 8px;background:none;border:1px solid var(--bd);border-radius:4px;color:var(--tx2);font-size:10px;cursor:pointer;font-family:inherit}
#term{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
#out{flex:1;overflow-y:auto;padding:8px 12px 60px;font-size:13px;line-height:1.8;min-height:0}
#out::-webkit-scrollbar{width:3px}
#out::-webkit-scrollbar-thumb{background:var(--bd)}
.ln{white-space:pre-wrap;word-break:break-all}
.ln.cmd{color:var(--gn)}
.ln.err{color:var(--rd)}
.ln.sys{color:#3b82f6}
.ln.ai{color:var(--yw)}
.ln.ok{color:var(--gn)}
.pr{display:flex;align-items:center;padding:2px 0}
.pr .ps{color:var(--gn);margin-right:6px;font-weight:700;white-space:nowrap}
.pr input{flex:1;background:none;border:none;color:var(--tx);font-size:13px;font-family:inherit;outline:none;caret-color:var(--gn)}
#dock{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);background:#161616dd;backdrop-filter:blur(8px);border:1px solid var(--bd);border-radius:14px;padding:5px 8px;display:flex;gap:4px;z-index:50}
.dk{width:34px;height:34px;border-radius:8px;border:1px solid var(--bd);background:var(--bg);color:var(--tx2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.dk:active{transform:scale(.92)}
.dk.on{border-color:var(--ac);color:var(--ac2);background:#7c6cf018}
.dk svg{width:15px;height:15px}
.bdg{position:absolute;top:-3px;right:-3px;width:13px;height:13px;background:var(--rd);border-radius:50%;font-size:7px;color:#fff;display:none;align-items:center;justify-content:center;font-weight:700}
#ov{position:fixed;inset:0;background:#0009;z-index:60;display:none}
#ov.show{display:block}
.pnl{position:fixed;top:0;height:100%;background:var(--sf);z-index:70;display:flex;flex-direction:column;transition:transform .2s}
.pnl.L{left:0;width:280px;max-width:85vw;border-right:1px solid var(--bd);transform:translateX(-110%)}
.pnl.R{right:0;width:100%;border-left:1px solid var(--bd);transform:translateX(110%)}
.pnl.open{transform:translateX(0)}
.ph{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;font-size:12px;font-weight:700}
.pb{flex:1;overflow-y:auto}
.xb{width:24px;height:24px;border:1px solid var(--bd);border-radius:5px;background:var(--bg);color:var(--tx2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;margin-left:6px}
.fi{padding:8px 14px;font-size:11px;display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--tx2);border-bottom:1px solid #0f0f0f}
.fi:hover{background:var(--bd);color:var(--tx)}
.fi.d{color:var(--ac2)}
.fi svg{width:13px;height:13px;flex-shrink:0}
.fp{padding:5px 14px;font-size:10px;color:var(--tx2);background:var(--bg);border-bottom:1px solid var(--bd)}
.ef{width:100%;height:100%;background:var(--bg);color:var(--tx);font-family:inherit;font-size:12px;padding:12px;border:none;outline:none;resize:none;line-height:1.7}
.pi{padding:8px 14px;border-bottom:1px solid #0f0f0f}
.pi-n{font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;margin-bottom:2px}
.pi-c{font-size:9px;color:var(--tx2)}
.pi-a{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.b{padding:2px 7px;border:1px solid var(--bd);border-radius:3px;background:var(--bg);color:var(--tx2);font-size:9px;cursor:pointer;font-family:inherit}
.b.r{border-color:var(--rd);color:var(--rd)}
.b.g{border-color:var(--gn);color:var(--gn)}
.b.p{background:var(--ac);border-color:var(--ac);color:#fff}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sd.on{background:var(--gn);box-shadow:0 0 4px var(--gn)}
.sd.off{background:var(--rd)}
.pf{width:100%;height:100%;border:none;background:#fff}
.mo{position:fixed;inset:0;background:#000b;z-index:80;display:none;align-items:center;justify-content:center}
.mo.open{display:flex}
.md{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px;width:90%;max-width:360px}
.md h3{font-size:13px;margin-bottom:12px}
.ig{margin-bottom:8px}
.ig label{display:block;font-size:10px;color:var(--tx2);margin-bottom:2px}
.ig input{width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-size:11px;font-family:inherit;outline:none}
.ig input:focus{border-color:var(--ac)}
</style>
<style>
#out{counter-reset:lc}
.ln{counter-increment:lc;display:flex;gap:8px}
.ln::before{content:counter(lc);min-width:28px;text-align:right;color:#444;font-size:10px;line-height:1.8;user-select:none;flex-shrink:0}
.pr{counter-increment:lc;display:flex;align-items:center}
.pr::before{content:counter(lc);min-width:28px;text-align:right;color:#2a5a2a;font-size:10px;margin-right:8px;user-select:none;flex-shrink:0}
.ln.cmd::before{color:#2a5a2a}
.ln.err::before{color:#5a2a2a}
.ln.sys::before{color:#2a2a5a}
.ln.ai::before{color:#5a5a2a}
</style>
</head><body>
<script>
var TK=localStorage.getItem('codedeck_token');
var USR=JSON.parse(localStorage.getItem('codedeck_user')||'null');
if(!TK)window.location.href='/login.html';
var oF=window.fetch;
window.fetch=function(u,o){o=o||{};o.headers=o.headers||{};if(typeof o.headers==='object')o.headers['Authorization']='Bearer '+TK;return oF(u,o)};
function logout(){localStorage.removeItem('codedeck_token');localStorage.removeItem('codedeck_user');window.location.href='/login.html'}
</script>

<div id="tb">
<span id="tbl">CodeDeck</span>
<div id="tbr"><span id="uname"></span><button onclick="logout()">logout</button></div>
</div>

<div id="term"><div id="out" onclick="fi()"></div></div>

<div id="dock">
<div class="dk" onclick="tg('procs')" id="d-procs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
<div class="dk" onclick="tg('files')" id="d-files"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></div>
<div class="dk" onclick="tg('editor')" id="d-editor"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
<div class="dk" onclick="tg('ai')" id="d-ai"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="6" width="16" height="14" rx="2"/><circle cx="9" cy="12" r="1.5" fill="currentColor"/><circle cx="15" cy="12" r="1.5" fill="currentColor"/><path d="M9 16h6"/><line x1="12" y1="2" x2="12" y2="6"/><circle cx="12" cy="2" r="1"/></svg><div class="bdg" id="aibdg"></div></div>
<div class="dk" onclick="tg('preview')" id="d-preview"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
<div class="dk" onclick="tg('ext')" id="d-ext"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>
<div class="dk" onclick="oAd()" style="border-color:#7c6cf060;background:#7c6cf015"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--ac2)"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
</div>

<div id="ov" onclick="ca()"></div>
<div class="pnl L" id="p-procs"><div class="ph">Processes<button class="xb" onclick="ca()">x</button></div><div class="pb" id="procs-b"></div></div>
<div class="pnl L" id="p-files"><div class="ph">Files<div style="display:flex;gap:3px"><button class="b" onclick="nf()">+f</button><button class="b" onclick="nd()">+d</button><button class="xb" onclick="ca()">x</button></div></div><div class="fp" id="fpath">~</div><div class="pb" id="files-b"></div></div>
<div class="pnl R" id="p-editor"><div class="ph"><span id="edt">Editor</span><div style="display:flex;gap:3px"><button class="b p" onclick="svf()" id="svb" style="display:none">Save</button><button class="xb" onclick="ca()">x</button></div></div><div class="pb" id="ed-b"><div style="padding:20px;color:var(--tx2);text-align:center;font-size:11px">Open a file from Files</div></div></div>
<div class="pnl L" id="p-ai"><div class="ph">AI Brain<button class="xb" onclick="ca()">x</button></div><div class="pb" id="ai-b"><div style="padding:20px;text-align:center;color:var(--tx2);font-size:11px">All clear</div></div></div>
<div class="pnl R" id="p-preview"><div class="ph">Preview<div style="display:flex;gap:3px"><button class="b" onclick="rlp()">reload</button><button class="xb" onclick="ca()">x</button></div></div><div class="pb" id="pv-b"><div style="padding:20px;text-align:center;color:var(--tx2);font-size:11px">No preview</div></div></div>
<div class="pnl L" id="p-ext"><div class="ph">Extensions<button class="xb" onclick="ca()">x</button></div><div class="pb" id="ext-b"></div></div>

<div class="mo" id="admo"><div class="md"><h3>New Process</h3>
<div class="ig"><label>Name</label><input id="in" placeholder="my-server"></div>
<div class="ig"><label>Command</label><input id="ic" placeholder="node server.js"></div>
<div class="ig"><label>Directory</label><input id="id" placeholder="~/project"></div>
<div class="ig"><label>Port</label><input type="number" id="ip" placeholder="3000"></div>
<div class="ig" style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="ir"><label for="ir" style="margin:0;font-size:10px">Auto-restart</label></div>
<div style="display:flex;gap:6px;margin-top:10px"><button class="b p" onclick="aP()" style="flex:1">Start</button><button class="b" onclick="cAd()">Cancel</button></div>
</div></div>
<script>
var procs=[],errs=[],cdir='~',epath=null,tid=null,act=null,hist=[],hidx=-1,pfix=null,gcwd='~';
var SC={'ll':'ls -la','where am i':'pwd','home':'cd ~','install':'npm install','dev':'npm run dev','start':'npm start','build':'npm run build','test':'npm test','status':'git status','log':'git log --oneline -10','push':'git push origin main','pull':'git pull','diff':'git diff','disk':'df -h','memory':'free -h'};
if(USR)document.getElementById('uname').textContent=USR.name||USR.email;

function E(s){if(!s)return'';return String(s).replace(/\x1b\[[0-9;]*[a-zA-Z]/g,'').replace(/\u001b\[[0-9;]*[a-zA-Z]/g,'').replace(/\[[\d;]*[a-zA-Z]/g,'')}

function pr(t,c){var o=document.getElementById('out');var d=document.createElement('div');d.className='ln'+(c?' '+c:'');d.textContent=t===undefined?'':t;o.appendChild(d);o.scrollTop=o.scrollHeight}

function addP(){
var o=document.getElementById('out');
var r=document.createElement('div');r.className='pr';
var short=gcwd.replace('/data/data/com.termux/files/home','~');
r.innerHTML='<span class="ps">'+short+' $</span><input placeholder="type command...">';
var inp=r.querySelector('input');
inp.onkeydown=function(e){
if(e.key==='Enter'){e.preventDefault();go(this);return}
if(e.key==='ArrowUp'){e.preventDefault();if(hidx>0)hidx--;this.value=hist[hidx]||'';return}
if(e.key==='ArrowDown'){e.preventDefault();if(hidx<hist.length-1)hidx++;this.value=hist[hidx]||'';return}
if(e.key==='y'&&pfix&&!this.value){e.preventDefault();var f=pfix;pfix=null;lk(this.parentNode,'');pr('$ '+f,'cmd');snd(f);return}};
o.appendChild(r);o.scrollTop=o.scrollHeight;
setTimeout(function(){inp.focus()},50)}

function fi(){var i=document.querySelector('.pr input');if(i)i.focus()}

function lk(row,val){
var s=document.createElement('div');s.className='pr';
var short=gcwd.replace('/data/data/com.termux/files/home','~');
s.innerHTML='<span class="ps">'+short+' $</span><span style="color:var(--tx)">'+E(val)+'</span>';
row.parentNode.replaceChild(s,row)}

function go(inp){
var raw=inp.value.trim();
lk(inp.parentNode,raw);
if(!raw){addP();return}
hist.push(raw);hidx=hist.length;
var low=raw.toLowerCase();
if(low==='clear'){document.getElementById('out').innerHTML='';addP();return}
if(low==='help'){pr('');pr('  clear procs files edit ai preview ext new logout','sys');pr('');addP();return}
if(low==='procs'){tg('procs');addP();return}
if(low==='files'){tg('files');addP();return}
if(low==='edit'){tg('editor');addP();return}
if(low==='ai'){tg('ai');addP();return}
if(low==='preview'){tg('preview');addP();return}
if(low==='ext'){tg('ext');addP();return}
if(low==='new'){oAd();return}
if(low==='logout'){logout();return}
if(low==='status'){gC('status');return}
if(low==='log'){gC('log');return}
if(low==='push'){gC('push');return}
if(low==='pull'){gC('pull');return}
if(low==='diff'){gC('diff');return}
if(low==='branches'){gC('branch');return}
if(low.startsWith('commit ')){gC('commit',raw.slice(7).replace(/^["']/,'').replace(/["']$/,''));return}
if(low.startsWith('branch ')){gC('branch',raw.slice(7));return}
if(low.startsWith('cd ')){var nd=raw.slice(3).trim();gcwd=nd==='~'?'~':nd==='..'?gcwd.split('/').slice(0,-1).join('/')||'~':gcwd==='~'?'~/'+nd:gcwd+'/'+nd}
var cmd=SC[low]||raw;
if(cmd!==raw)pr('→ '+cmd,'sys');
pr('$ '+raw,'cmd');
snd(cmd)}

var sseStream=null;

function startSSE(){
if(!tid)return;
if(sseStream)sseStream.close();
sseStream=new EventSource('/api/terminal/'+tid+'/stream');
sseStream.onmessage=function(e){
try{var d=JSON.parse(e.data);
if(d.type==='connected')return;
var c=E(d.text).trim();
if(!c)return;
var cl=d.type==='stderr'?'err':'';
pr(c,cl);
if(d.type==='stderr'&&(c.toLowerCase().startsWith('error:')||c.includes('cannot find module')))aiC(c);
else dp(c)}catch(e){}};
sseStream.onerror=function(){
setTimeout(startSSE,2000)}}

var waitingPrompt=false;
async function snd(cmd){
if(!tid){pr('No shell','err');addP();return}
try{
await fetch('/api/terminal/'+tid+'/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:cmd})});
if(waitingPrompt)return;
waitingPrompt=true;
setTimeout(function(){waitingPrompt=false;addP()},1500)}
catch(e){pr('Error','err');addP()}}

async function ro(){
if(!tid)return;
try{var r=await fetch('/api/terminal/'+tid+'/output');var d=await r.json();
if(d.output&&d.output.length){d.output.forEach(function(o){var c=E(o.text).trim();if(!c)return;var cl=o.type==='stderr'?'err':o.type==='system'?'sys':'';pr(c,cl);if(o.type==='stderr'&&(c.toLowerCase().startsWith('error:')||c.includes('cannot find module')))aiC(c);else dp(c)})}}catch(e){}}

async function initT(){
pr('CodeDeck Terminal','sys');pr('Type "help" for commands','sys');pr('');
try{var r=await fetch('/api/terminal/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cwd:'~'})});var d=await r.json();
if(d.success){tid=d.id;pr('Shell ready ('+d.shell.split('/').pop()+')','sys');pr('')}
else pr('Shell error','err')}
catch(e){pr('Cannot start shell','err')}
addP()}

async function aiC(t){
try{var r=await fetch('/api/ai/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})});var d=await r.json();
if(d.result&&d.result.detected){var e=d.result;pr('');pr('AI: '+e.type+' - '+e.cause,'ai');(e.fixes||[]).slice(0,2).forEach(function(f){pr('  '+f,'ai')});if(e.autofix){pr('Press [y] to run: '+e.autofix,'ai');pfix=e.autofix}pr('')}}catch(e){}}

var ldp=null;
function dp(t){var m=t.match(/localhost:(\d{2,5})|port (\d{2,5})/i);if(m){var p=parseInt(m[1]||m[2]);if(p>1000&&p!==ldp){ldp=p;pr('Preview ready on port '+p,'sys')}}}

function tg(n){if(act===n){ca();return}ca();act=n;document.getElementById('ov').classList.add('show');document.getElementById('p-'+n).classList.add('open');var dk=document.getElementById('d-'+n);if(dk)dk.classList.add('on');if(n==='procs')rP();if(n==='files')rF();if(n==='ai')rAI();if(n==='preview')rPV();if(n==='ext')rExt()}
function ca(){act=null;document.getElementById('ov').classList.remove('show');document.querySelectorAll('.pnl').forEach(function(p){p.classList.remove('open')});document.querySelectorAll('.dk').forEach(function(b){b.classList.remove('on')});fi()}

async function fP(){try{var r=await fetch('/api/processes');var d=await r.json();procs=d.processes||[]}catch(e){}}
function rP(){var el=document.getElementById('procs-b');if(!procs.length){el.innerHTML='<div style="padding:16px;text-align:center;color:var(--tx2);font-size:11px">No processes</div>';return}el.innerHTML=procs.map(function(p){var s=p.running?'on':'off';var a=p.running?'<button class="b r" onclick="sP(\''+p.name+'\')">stop</button><button class="b" onclick="rP2(\''+p.name+'\')">restart</button>':'<button class="b g" onclick="rP2(\''+p.name+'\')">start</button>';a+='<button class="b" onclick="vL(\''+p.name+'\')">logs</button>';if(p.port&&p.running)a+='<button class="b" onclick="oPV('+p.port+')">preview</button>';a+='<button class="b r" onclick="dP(\''+p.name+'\')">del</button>';return'<div class="pi"><div class="pi-n"><span class="sd '+s+'"></span>'+p.name+'</div><div class="pi-c">'+p.command+'</div><div class="pi-a">'+a+'</div></div>'}).join('')}
async function sP(n){await fetch('/api/processes/'+n+'/stop',{method:'POST'});await fP();rP()}
async function rP2(n){await fetch('/api/processes/'+n+'/restart',{method:'POST'});await fP();rP()}
async function dP(n){if(!confirm('Delete '+n+'?'))return;await fetch('/api/processes/'+n,{method:'DELETE'});await fP();rP()}
async function vL(n){ca();try{var r=await fetch('/api/processes/'+n+'/logs');var d=await r.json();pr('--- '+n+' ---','sys');(d.logs||[]).forEach(function(l){pr(E(l.text),l.type==='stderr'?'err':l.type==='ai'?'ai':'')});pr('--- end ---','sys')}catch(e){}addP()}
function oAd(){document.getElementById('admo').classList.add('open')}
function cAd(){document.getElementById('admo').classList.remove('open')}
async function aP(){var n=document.getElementById('in').value.trim(),c=document.getElementById('ic').value.trim(),d=document.getElementById('id').value.trim(),p=document.getElementById('ip').value,ar=document.getElementById('ir').checked;if(!n||!c)return alert('Required');await fetch('/api/processes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,command:c,cwd:d||undefined,port:p?parseInt(p):undefined,autoRestart:ar})});cAd();await fP();pr('Started '+n,'ok')}

async function rF(){var el=document.getElementById('files-b');try{var r=await fetch('/api/files?path='+encodeURIComponent(cdir));var d=await r.json();if(d.error){el.innerHTML='<div style="padding:16px;color:var(--rd);font-size:11px">'+d.error+'</div>';return}document.getElementById('fpath').textContent=d.path.replace('/data/data/com.termux/files/home','~');var h='';if(d.parent)h+='<div class="fi d" onclick="cdir=\''+d.parent+'\';rF()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>..</div>';d.items.forEach(function(f){if(f.type==='dir')h+='<div class="fi d" onclick="cdir=\''+f.path+'\';rF()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>'+f.name+'</div>';else h+='<div class="fi" onclick="opF(\''+f.path+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+f.name+'</div>'});el.innerHTML=h||'<div style="padding:16px;color:var(--tx2);text-align:center;font-size:11px">Empty</div>'}catch(e){}}
async function nf(){var n=prompt('File name:');if(!n)return;await fetch('/api/files/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:cdir+'/'+n,type:'file'})});rF()}
async function nd(){var n=prompt('Folder:');if(!n)return;await fetch('/api/files/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:cdir+'/'+n,type:'dir'})});rF()}

async function opF(p){epath=p;ca();tg('editor');try{var r=await fetch('/api/files/read?path='+encodeURIComponent(p));var d=await r.json();if(d.error){document.getElementById('ed-b').innerHTML='<div style="padding:16px;color:var(--rd)">'+d.error+'</div>';return}document.getElementById('edt').textContent=d.path.replace('/data/data/com.termux/files/home','~');document.getElementById('svb').style.display='block';document.getElementById('ed-b').innerHTML='<textarea class="ef" id="ea">'+E(d.content)+'</textarea>'}catch(e){}}
async function svf(){if(!epath)return;var c=document.getElementById('ea').value;try{var r=await fetch('/api/files/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:epath,content:c})});var d=await r.json();if(d.success){var b=document.getElementById('svb');b.textContent='Saved!';b.style.background='var(--gn)';setTimeout(function(){b.textContent='Save';b.style.background=''},1500)}}catch(e){}}

async function fAI(){try{var r=await fetch('/api/ai/errors');var d=await r.json();errs=d.errors||[];var b=document.getElementById('aibdg');b.textContent=errs.length;b.style.display=errs.length>0?'flex':'none'}catch(e){}}
function rAI(){var el=document.getElementById('ai-b');if(!errs.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--tx2);font-size:11px">All clear</div>';return}el.innerHTML=errs.map(function(e){return'<div style="padding:10px 14px;border-bottom:1px solid #0f0f0f"><div style="font-size:11px;font-weight:700;color:var(--rd)">'+e.type+'</div><div style="font-size:10px;color:var(--tx2)">'+e.cause+'</div>'+(e.fixes||[]).map(function(f){return'<div style="font-size:10px;color:#555">'+f+'</div>'}).join('')+'</div>'}).join('')}

function rPV(){var el=document.getElementById('pv-b');var r=procs.filter(function(p){return p.port&&p.running});if(!r.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--tx2);font-size:11px">No preview</div>';return}el.innerHTML='<iframe class="pf" src="http://localhost:'+r[0].port+'"></iframe>'}
function oPV(p){ca();tg('preview');document.getElementById('pv-b').innerHTML='<iframe class="pf" src="http://localhost:'+p+'"></iframe>'}
function rlp(){var f=document.querySelector('.pf');if(f)f.src=f.src}

async function rExt(){var el=document.getElementById('ext-b');try{var r=await fetch('/api/extensions');var d=await r.json();el.innerHTML=(d.extensions||[]).map(function(e){var cmds=Object.keys(e.commands||{}).map(function(k){return'<span style="display:inline-block;padding:1px 5px;background:var(--bg);border:1px solid var(--bd);border-radius:3px;font-size:8px;margin:1px;cursor:pointer" onclick="var i=document.querySelector(\'.pr input\');if(i)i.value=\''+k+'\';ca()">'+k+'</span>'}).join('');return'<div style="padding:8px 14px;border-bottom:1px solid #0f0f0f"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div style="width:20px;height:20px;background:'+e.color+'22;border:1px solid '+e.color+'44;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:'+e.color+'">'+e.icon+'</div><span style="font-size:10px;font-weight:700">'+e.name+'</span></div><div>'+cmds+'</div></div>'}).join('')}catch(e){}}

async function gC(a,arg){
try{var r,d,cwd=gcwd;
if(a==='status'){r=await fetch('/api/git/status?cwd='+encodeURIComponent(cwd));d=await r.json();pr(d.output||'Clean','ok')}
else if(a==='log'){r=await fetch('/api/git/log?cwd='+encodeURIComponent(cwd));d=await r.json();(d.output||'No commits').split('\n').forEach(function(l){if(l)pr(l,'')})}
else if(a==='diff'){r=await fetch('/api/git/diff?cwd='+encodeURIComponent(cwd));d=await r.json();pr(d.output||'No changes','')}
else if(a==='push'){r=await fetch('/api/git/push',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cwd:cwd})});d=await r.json();pr(d.output||d.error,d.success?'ok':'err')}
else if(a==='pull'){r=await fetch('/api/git/pull',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cwd:cwd})});d=await r.json();pr(d.output||d.error,d.success?'ok':'err')}
else if(a==='commit'){if(!arg){pr('Usage: commit your message','err');addP();return}r=await fetch('/api/git/commit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:arg,cwd:cwd})});d=await r.json();pr(d.output||d.error,d.success?'ok':'err')}
else if(a==='branch'){r=await fetch('/api/git/branch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:arg,cwd:cwd})});d=await r.json();pr(d.output||d.error,'ok')}
}catch(e){pr('Git error','err')}
addP()}

document.addEventListener('DOMContentLoaded',function(){
initT();fP();fAI();
setInterval(function(){fP();fAI()},8000);
document.getElementById('admo').addEventListener('click',function(e){if(e.target===e.currentTarget)cAd()})});
</script>
</body></html>
