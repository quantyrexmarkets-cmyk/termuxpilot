<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>CodeDeck</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050510;--sf:#0a0a1a;--bd:#151530;--tx:#d4d4e8;--tx2:#555;--ac:#7c6cf0;--ac2:#b4a8ff;--gn:#10b981;--rd:#ef4444;--yw:#eab308}
body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Full screen terminal */
.term-root{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.term-header{height:36px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0}
.term-title{font-size:12px;color:var(--tx2);flex:1}
.term-tab{padding:3px 10px;font-size:11px;color:var(--tx2);border-radius:4px;cursor:pointer;border:1px solid transparent}
.term-tab.active{color:var(--ac2);border-color:var(--ac);background:var(--ac)15}
.term-body{flex:1;overflow-y:auto;padding:12px 14px;font-size:13px;line-height:1.7;color:#ccc;white-space:pre-wrap;word-break:break-all}
.term-body .t-err{color:var(--rd)}
.term-body .t-sys{color:#0984e3}
.term-body .t-ai{color:var(--yw);font-weight:bold}
.term-body .t-ok{color:var(--gn)}
.term-input-row{display:flex;align-items:center;background:var(--sf);border-top:1px solid var(--bd);flex-shrink:0}
.term-ps{padding:10px;color:var(--gn);font-size:13px}
.term-in{flex:1;padding:10px;background:transparent;border:none;color:var(--tx);font-size:13px;font-family:inherit;outline:none}

/* Floating Dock */
.dock{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:var(--sf)ee;backdrop-filter:blur(12px);border:1px solid var(--bd);padding:6px 10px;border-radius:16px;display:flex;gap:6px;z-index:90}
.dock-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--bd);background:var(--bg);color:var(--tx2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;position:relative}
.dock-btn:active{transform:scale(.9)}
.dock-btn:hover{border-color:var(--ac);color:var(--ac2)}
.dock-btn.active{border-color:var(--ac);color:var(--ac2);background:var(--ac)15}
.dock-btn svg{width:16px;height:16px}
.dock-badge{position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:var(--rd);border-radius:50%;font-size:8px;color:#fff;display:none;align-items:center;justify-content:center;font-weight:700}

/* Slide Panels */
.panel-overlay{position:fixed;inset:0;background:#0008;z-index:95;display:none}
.panel-overlay.show{display:block}
.panel{position:fixed;top:0;height:100%;background:var(--sf);border-right:1px solid var(--bd);z-index:96;transition:transform .25s;overflow:hidden;display:flex;flex-direction:column}
.panel-left{left:0;width:280px;transform:translateX(-100%)}
.panel-left.open{transform:translateX(0)}
.panel-right{right:0;width:100%;border-right:none;border-left:1px solid var(--bd);transform:translateX(100%)}
.panel-right.open{transform:translateX(0)}
.panel-h{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.panel-body{flex:1;overflow-y:auto}
.close-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);color:var(--tx2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.close-btn:hover{border-color:var(--rd);color:var(--rd)}

/* File tree */
.ft-item{padding:8px 14px;font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--tx2);border-bottom:1px solid var(--bd)08}
.ft-item:hover{background:var(--bd);color:var(--tx)}
.ft-item.dir{color:var(--ac2)}
.ft-item svg{width:14px;height:14px;flex-shrink:0}
.ft-path{padding:8px 14px;font-size:11px;color:var(--tx2);border-bottom:1px solid var(--bd);background:var(--bg)}

/* Editor */
.editor-full{width:100%;height:100%;background:var(--bg);color:var(--tx);font-family:inherit;font-size:13px;padding:14px;border:none;outline:none;resize:none;line-height:1.7}
.editor-bar{padding:8px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.editor-path{font-size:11px;color:var(--tx2)}

/* AI Panel */
.ai-item{padding:12px 14px;border-bottom:1px solid var(--bd)}
.ai-type{font-size:12px;font-weight:700;color:var(--rd);margin-bottom:4px}
.ai-cause{font-size:11px;color:var(--tx2);margin-bottom:6px}
.ai-fix{font-size:11px;color:var(--tx2);padding:2px 0}
.ai-btn{padding:4px 10px;background:var(--ac);border:none;color:#fff;border-radius:4px;font-size:10px;cursor:pointer;margin-top:6px}

/* Process list in panel */
.proc-item{padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer}
.proc-item:hover{background:var(--bd)}
.proc-name{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.proc-cmd{font-size:10px;color:var(--tx2);margin-top:2px}
.proc-actions{display:flex;gap:4px;margin-top:6px}
.p-btn{padding:3px 8px;border:1px solid var(--bd);border-radius:4px;background:var(--bg);color:var(--tx2);font-size:10px;cursor:pointer}
.p-btn:hover{border-color:var(--ac)}
.p-btn.danger{border-color:var(--rd);color:var(--rd)}
.p-btn.green{border-color:var(--gn);color:var(--gn)}
.sd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sd.on{background:var(--gn);box-shadow:0 0 5px var(--gn)}
.sd.off{background:var(--rd)}

/* Preview */
.preview-frame{width:100%;height:100%;border:none;background:#fff}

/* Modal */
.mo{position:fixed;inset:0;background:#000a;z-index:99;display:none;align-items:center;justify-content:center}
.mo.open{display:flex}
.md{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;width:90%;max-width:380px}
.md h3{font-size:14px;margin-bottom:14px}
.ig{margin-bottom:10px}
.ig label{display:block;font-size:11px;color:var(--tx2);margin-bottom:3px}
.ig input{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:12px;font-family:inherit;outline:none}
.ig input:focus{border-color:var(--ac)}
.btn{padding:6px 12px;border:1px solid var(--bd);border-radius:6px;background:var(--bg);color:var(--tx);font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px}
.btn:active{transform:scale(.96)}
.btn svg{width:12px;height:12px}
.btn-p{background:var(--ac);border-color:var(--ac);color:#fff}
</style></head><body>

<!-- Auth Check -->
<script>
var TOKEN=localStorage.getItem('codedeck_token');
var USER=JSON.parse(localStorage.getItem('codedeck_user')||'null');
if(!TOKEN){window.location.href='/login.html';}
var origFetch=window.fetch;
window.fetch=function(url,opts){
opts=opts||{};opts.headers=opts.headers||{};
if(typeof opts.headers==='object'&&!(opts.headers instanceof Headers)){
opts.headers['Authorization']='Bearer '+TOKEN;}
return origFetch(url,opts)};
function logout(){localStorage.removeItem('codedeck_token');localStorage.removeItem('codedeck_user');window.location.href='/login.html'}
</script>

<!-- Terminal Root -->
<div class="term-root">
<div class="term-header">
<span class="term-title" id="term-title">CodeDeck Terminal</span>
<span style="font-size:11px;color:var(--tx2)" id="user-display"></span>
<button class="close-btn" onclick="logout()" style="width:auto;padding:0 8px;font-size:10px">Logout</button>
</div>
<div class="term-body" id="term-out"></div>
<div class="term-input-row">
<span class="term-ps">$</span>
<input class="term-in" id="term-cmd" placeholder="Type a command..." onkeydown="if(event.key==='Enter')sendCmd()" autofocus>
</div>
</div>

<!-- Floating Dock -->
<div class="dock">
<div class="dock-btn" onclick="togglePanel('procs')" id="d-procs" title="Processes">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
</div>
<div class="dock-btn" onclick="togglePanel('files')" id="d-files" title="Files">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
</div>
<div class="dock-btn" onclick="togglePanel('editor')" id="d-editor" title="Editor">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
</div>
<div class="dock-btn" onclick="togglePanel('ai')" id="d-ai" title="AI Brain">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="6" width="16" height="14" rx="2"/><circle cx="9" cy="12" r="1.5" fill="currentColor"/><circle cx="15" cy="12" r="1.5" fill="currentColor"/><path d="M9 16h6"/><line x1="12" y1="2" x2="12" y2="6"/><circle cx="12" cy="2" r="1"/></svg>
<div class="dock-badge" id="ai-badge">0</div>
</div>
<div class="dock-btn" onclick="togglePanel('preview')" id="d-preview" title="Preview">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
</div>
<div class="dock-btn" onclick="openAddProc()" id="d-add" title="New Process" style="background:var(--ac)20;border-color:var(--ac)">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--ac2)"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</div>
</div>

<!-- Panel Overlay -->
<div class="panel-overlay" id="panel-overlay" onclick="closeAllPanels()"></div>

<!-- Processes Panel -->
<div class="panel panel-left" id="pan-procs">
<div class="panel-h"><div class="panel-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Processes</div><button class="close-btn" onclick="closeAllPanels()">x</button></div>
<div class="panel-body" id="procs-body"></div>
</div>

<!-- Files Panel -->
<div class="panel panel-left" id="pan-files">
<div class="panel-h"><div class="panel-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Files</div><div style="display:flex;gap:4px"><button class="p-btn" onclick="newFile()">+ File</button><button class="p-btn" onclick="newDir()">+ Folder</button><button class="close-btn" onclick="closeAllPanels()">x</button></div></div>
<div class="ft-path" id="ft-path">~</div>
<div class="panel-body" id="files-body"></div>
</div>

<!-- Editor Panel -->
<div class="panel panel-right" id="pan-editor">
<div class="panel-h"><div class="panel-title" id="ed-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editor</div><div style="display:flex;gap:4px"><button class="btn btn-p" onclick="saveFile()" id="save-btn" style="display:none">Save</button><button class="close-btn" onclick="closeAllPanels()">x</button></div></div>
<div class="panel-body" id="editor-body"><div style="padding:20px;color:var(--tx2);text-align:center;font-size:12px">Open a file from Files panel</div></div>
</div>

<!-- AI Panel -->
<div class="panel panel-left" id="pan-ai">
<div class="panel-h"><div class="panel-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><rect x="4" y="6" width="16" height="14" rx="2"/><circle cx="9" cy="12" r="1.5" fill="currentColor"/><circle cx="15" cy="12" r="1.5" fill="currentColor"/><path d="M9 16h6"/><line x1="12" y1="2" x2="12" y2="6"/><circle cx="12" cy="2" r="1"/></svg>AI Brain</div><button class="close-btn" onclick="closeAllPanels()">x</button></div>
<div class="panel-body" id="ai-body"><div style="padding:20px;color:var(--tx2);text-align:center;font-size:12px">No errors detected</div></div>
</div>

<!-- Preview Panel -->
<div class="panel panel-right" id="pan-preview">
<div class="panel-h"><div class="panel-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Preview</div><div style="display:flex;gap:4px"><button class="p-btn" onclick="reloadPreview()">Reload</button><button class="close-btn" onclick="closeAllPanels()">x</button></div></div>
<div class="panel-body" id="preview-body"><div style="padding:20px;color:var(--tx2);text-align:center;font-size:12px">No preview available</div></div>
</div>

<!-- Add Process Modal -->
<div class="mo" id="add-mo"><div class="md"><h3>New Process</h3>
<div class="ig"><label>Name</label><input type="text" id="i-n" placeholder="my-server"></div>
<div class="ig"><label>Command</label><input type="text" id="i-c" placeholder="node server.js"></div>
<div class="ig"><label>Directory</label><input type="text" id="i-d" placeholder="~/project"></div>
<div class="ig"><label>Port</label><input type="number" id="i-p" placeholder="3000"></div>
<div class="ig" style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="i-r"><label for="i-r" style="margin:0;font-size:11px">Auto-restart</label></div>
<div style="display:flex;gap:8px;margin-top:14px"><button class="btn btn-p" onclick="addProc()" style="flex:1">Start</button><button class="btn" onclick="closeAddProc()">Cancel</button></div>
</div></div>
<script>
var procs=[],errs=[],curDir='~',editPath=null,termWs=null,activePanel=null;

// User display
if(USER){var ud=document.getElementById('user-display');if(ud)ud.textContent=USER.name||USER.email}

function E(s){if(!s)return'';s=s.replace(/\x1b\[[0-9;]*m/g,'').replace(/\u001b\[[0-9;]*m/g,'').replace(/\[\d+m/g,'');var d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ═══ Terminal WebSocket ═══
function initTerm(){
if(termWs&&termWs.readyState===1)return;
var proto=location.protocol==='https:'?'wss':'ws';
termWs=new WebSocket(proto+'://'+location.host+'/ws/terminal');
termWs.onopen=function(){
termWs.send(JSON.stringify({type:'create',cwd:'~'}));
tWrite('CodeDeck Terminal v2.0\nType commands below\n\n','t-sys')};
termWs.onmessage=function(e){
try{var d=JSON.parse(e.data);
if(d.type==='output')tWrite(d.text,'');
if(d.type==='error')tWrite(d.text,'t-err');
if(d.type==='exit')tWrite('\nShell exited ('+d.code+')\n','t-sys');
}catch(e){}};
termWs.onclose=function(){tWrite('\nDisconnected. Refresh to reconnect.\n','t-sys')};
termWs.onerror=function(){tWrite('Connection error\n','t-err')}}

function sendCmd(){
var input=document.getElementById('term-cmd');
var cmd=input.value.trim();
if(!cmd)return;
input.value='';

// Local commands
if(cmd==='clear'){document.getElementById('term-out').innerHTML='';return}
if(cmd==='help'){tWrite('\nCodeDeck Commands:\n  clear     - Clear terminal\n  procs     - Show processes\n  newproc   - Add process\n  files     - Open files\n  ai        - Show AI errors\n  logout    - Sign out\n\n','t-sys');return}
if(cmd==='procs'){togglePanel('procs');return}
if(cmd==='files'){togglePanel('files');return}
if(cmd==='ai'){togglePanel('ai');return}
if(cmd==='newproc'){openAddProc();return}
if(cmd==='logout'){logout();return}

// Send to shell
if(!termWs||termWs.readyState!==1){tWrite('Not connected\n','t-err');return}
termWs.send(JSON.stringify({type:'input',text:cmd+'\n'}))}

function tWrite(text,cls){
var out=document.getElementById('term-out');
var span=document.createElement('span');
if(cls)span.className=cls;
span.textContent=text;
out.appendChild(span);
out.scrollTop=out.scrollHeight}

// ═══ Panel System ═══
function togglePanel(name){
if(activePanel===name){closeAllPanels();return}
closeAllPanels();
activePanel=name;
document.getElementById('panel-overlay').classList.add('show');
document.getElementById('pan-'+name).classList.add('open');
document.getElementById('d-'+name).classList.add('active');
if(name==='procs')renderProcs();
if(name==='files')renderFiles();
if(name==='ai')renderAI();
if(name==='preview')renderPreview()}

function closeAllPanels(){
activePanel=null;
document.getElementById('panel-overlay').classList.remove('show');
document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('open')});
document.querySelectorAll('.dock-btn').forEach(function(b){b.classList.remove('active')})}

// ═══ Processes ═══
async function fetchProcs(){
try{var r=await fetch('/api/processes');var d=await r.json();procs=d.processes||[]}catch(e){}}

function renderProcs(){
var el=document.getElementById('procs-body');
if(!procs.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--tx2);font-size:12px">No processes running</div>';return}
el.innerHTML=procs.map(function(p){
var s=p.running?'on':'off';
var acts=p.running
?'<button class="p-btn danger" onclick="stopProc(\''+E(p.name)+'\')">Stop</button><button class="p-btn" onclick="restartProc(\''+E(p.name)+'\')">Restart</button>'
:'<button class="p-btn green" onclick="restartProc(\''+E(p.name)+'\')">Start</button>';
acts+='<button class="p-btn" onclick="viewLogs(\''+E(p.name)+'\')">Logs</button>';
if(p.port&&p.running)acts+='<button class="p-btn" onclick="openPreview('+p.port+')">Preview</button>';
acts+='<button class="p-btn danger" onclick="removeProc(\''+E(p.name)+'\')">Del</button>';
return'<div class="proc-item"><div class="proc-name"><span class="sd '+s+'"></span>'+E(p.name)+'</div><div class="proc-cmd">'+E(p.command)+'</div><div class="proc-actions">'+acts+'</div></div>'
}).join('')}

async function stopProc(n){await fetch('/api/processes/'+n+'/stop',{method:'POST'});await fetchProcs();renderProcs()}
async function restartProc(n){await fetch('/api/processes/'+n+'/restart',{method:'POST'});await fetchProcs();renderProcs()}
async function removeProc(n){if(!confirm('Remove '+n+'?'))return;await fetch('/api/processes/'+n,{method:'DELETE'});await fetchProcs();renderProcs()}
async function viewLogs(n){
closeAllPanels();
try{var r=await fetch('/api/processes/'+n+'/logs');var d=await r.json();var logs=d.logs||[];
tWrite('\n--- Logs: '+n+' ---\n','t-sys');
logs.forEach(function(l){
var cls=l.type==='stderr'?'t-err':l.type==='system'?'t-sys':l.type==='ai'?'t-ai':'';
tWrite(E(l.text)+'\n',cls)});
tWrite('--- End logs ---\n\n','t-sys')}catch(e){}}

function openAddProc(){document.getElementById('add-mo').classList.add('open')}
function closeAddProc(){document.getElementById('add-mo').classList.remove('open')}
async function addProc(){
var n=document.getElementById('i-n').value.trim(),c=document.getElementById('i-c').value.trim(),d=document.getElementById('i-d').value.trim(),p=document.getElementById('i-p').value,ar=document.getElementById('i-r').checked;
if(!n||!c)return alert('Name and command required');
await fetch('/api/processes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,command:c,cwd:d||undefined,port:p?parseInt(p):undefined,autoRestart:ar})});
closeAddProc();await fetchProcs();
tWrite('Process '+n+' started\n','t-ok')}

// ═══ Files ═══
async function renderFiles(){
var el=document.getElementById('files-body');
try{var r=await fetch('/api/files?path='+encodeURIComponent(curDir));var d=await r.json();
if(d.error){el.innerHTML='<div style="padding:20px;color:var(--rd)">'+E(d.error)+'</div>';return}
var short=d.path.replace('/data/data/com.termux/files/home','~');
document.getElementById('ft-path').textContent=short;
var html='';
if(d.parent)html+='<div class="ft-item dir" onclick="curDir=\''+E(d.parent)+'\';renderFiles()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> ..</div>';
d.items.forEach(function(f){
if(f.type==='dir')html+='<div class="ft-item dir" onclick="curDir=\''+E(f.path)+'\';renderFiles()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>'+E(f.name)+'</div>';
else html+='<div class="ft-item" onclick="openFile(\''+E(f.path)+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+E(f.name)+'</div>'});

// User display

function E(s){if(!s)return'';s=s.replace(/\x1b\[[0-9;]*m/g,'').replace(/\u001b\[[0-9;]*m/g,'').replace(/\[\d+m/g,'');var d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ═══ Terminal WebSocket ═══
function initTerm(){
if(termWs&&termWs.readyState===1)return;
var proto=location.protocol==='https:'?'wss':'ws';
termWs=new WebSocket(proto+'://'+location.host+'/ws/terminal');
termWs.onopen=function(){
termWs.send(JSON.stringify({type:'create',cwd:'~'}));
tWrite('CodeDeck Terminal v2.0\nType commands below\n\n','t-sys')};
termWs.onmessage=function(e){
try{var d=JSON.parse(e.data);
if(d.type==='output')tWrite(d.text,'');
if(d.type==='error')tWrite(d.text,'t-err');
if(d.type==='exit')tWrite('\nShell exited ('+d.code+')\n','t-sys');
}catch(e){}};
termWs.onclose=function(){tWrite('\nDisconnected. Refresh to reconnect.\n','t-sys')};
termWs.onerror=function(){tWrite('Connection error\n','t-err')}}

function sendCmd(){
var input=document.getElementById('term-cmd');
var cmd=input.value.trim();
if(!cmd)return;
input.value='';

// Local commands
if(cmd==='clear'){document.getElementById('term-out').innerHTML='';return}
if(cmd==='help'){tWrite('\nCodeDeck Commands:\n  clear     - Clear terminal\n  procs     - Show processes\n  newproc   - Add process\n  files     - Open files\n  ai        - Show AI errors\n  logout    - Sign out\n\n','t-sys');return}
if(cmd==='procs'){togglePanel('procs');return}
if(cmd==='files'){togglePanel('files');return}
if(cmd==='ai'){togglePanel('ai');return}
if(cmd==='newproc'){openAddProc();return}
if(cmd==='logout'){logout();return}

// Send to shell
if(!termWs||termWs.readyState!==1){tWrite('Not connected\n','t-err');return}
termWs.send(JSON.stringify({type:'input',text:cmd+'\n'}))}

function tWrite(text,cls){
var out=document.getElementById('term-out');
var span=document.createElement('span');
if(cls)span.className=cls;
span.textContent=text;
out.appendChild(span);
out.scrollTop=out.scrollHeight}

// ═══ Panel System ═══
function togglePanel(name){

activePanel=name;

document.getElementById('pan-'+name).classList.add('open');
document.getElementById('d-'+name).classList.add('active');

if(name==='files')renderFiles();

function closeAllPanels(){

async function fetchProcs(){
try{var r=await fetch('/api/processes');var d=await r.json();procs=d.processes||[]}catch(e){}}

function renderProcs(){
var el=document.getElementById('procs-body');
if(!procs.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--tx2);font-size:12px">No processes running</div>';return}
el.innerHTML=procs.map(function(p){
var s=p.running?'on':'off';
var acts=p.running
?'<button class="p-btn danger" onclick="stopProc(\''+E(p.name)+'\')">Stop</button><button class="p-btn" onclick="restartProc(\''+E(p.name)+'\')">Restart</button>'
:'<button class="p-btn green" onclick="restartProc(\''+E(p.name)+'\')">Start</button>';
acts+='<button class="p-btn" onclick="viewLogs(\''+E(p.name)+'\')">Logs</button>';
if(p.port&&p.running)acts+='<button class="p-btn" onclick="openPreview('+p.port+')">Preview</button>';
acts+='<button class="p-btn danger" onclick="removeProc(\''+E(p.name)+'\')">Del</button>';
return'<div class="proc-item"><div class="proc-name"><span class="sd '+s+'"></span>'+E(p.name)+'</div><div class="proc-cmd">'+E(p.command)+'</div><div class="proc-actions">'+acts+'</div></div>'
}).join('')}

async function stopProc(n){await fetch('/api/processes/'+n+'/stop',{method:'POST'});await fetchProcs();renderProcs()}
async function restartProc(n){await fetch('/api/processes/'+n+'/restart',{method:'POST'});await fetchProcs();renderProcs()}
async function removeProc(n){if(!confirm('Remove '+n+'?'))return;await fetch('/api/processes/'+n,{method:'DELETE'});await fetchProcs();renderProcs()}
async function viewLogs(n){
closeAllPanels();
try{var r=await fetch('/api/processes/'+n+'/logs');var d=await r.json();var logs=d.logs||[];
tWrite('\n--- Logs: '+n+' ---\n','t-sys');
logs.forEach(function(l){
var cls=l.type==='stderr'?'t-err':l.type==='system'?'t-sys':l.type==='ai'?'t-ai':'';
tWrite(E(l.text)+'\n',cls)});
tWrite('--- End logs ---\n\n','t-sys')}catch(e){}}
