<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>CodeDeck</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--sf:#0a0a1a;--bd:#151530;--tx:#d4d4e8;--tx2:#555;--ac:#7c6cf0;--ac2:#b4a8ff;--gn:#10b981;--rd:#ef4444;--yw:#eab308}
html,body{margin:0;padding:0;width:100%;max-width:100vw;overflow:hidden}
body{background:#000;color:var(--tx);font-family:'Courier New',monospace;height:100vh;height:100dvh;display:flex;flex-direction:column}

.term{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#000}
.term-top{height:32px;background:#111;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 10px;justify-content:space-between;flex-shrink:0}
.term-top-l{font-size:11px;color:var(--gn);font-weight:700}
.term-top-r{display:flex;gap:6px;align-items:center}
.term-top-r span{font-size:9px;color:#444}
.term-top-r button{padding:2px 6px;background:none;border:1px solid #333;border-radius:3px;color:#666;font-size:9px;cursor:pointer;font-family:inherit}

.term-scroll{flex:1;overflow-y:auto;padding:8px 10px 70px 10px;font-size:13px;line-height:1.6}
.term-scroll::-webkit-scrollbar{width:3px}
.term-scroll::-webkit-scrollbar-thumb{background:#222;border-radius:3px}

.t-line{margin:0;padding:1px 0;min-height:1em;white-space:pre-wrap;word-break:break-all;font-size:12px;letter-spacing:0.2px}
.t-in{color:var(--gn)}
.t-out{color:#aaa}
.t-err{color:var(--rd)}
.t-sys{color:#0984e3}
.t-ai{color:var(--yw)}
.t-ok{color:var(--gn)}

.prompt-line{display:flex;align-items:center;margin-top:6px;padding:2px 0}
.prompt-ps{color:var(--gn);font-weight:700;margin-right:6px;flex-shrink:0}
.prompt-input{flex:1;background:none;border:none;color:var(--tx);font-size:12px;font-family:inherit;outline:none;padding:0;caret-color:var(--gn);letter-spacing:0.2px}

.dock{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);background:#111e;backdrop-filter:blur(10px);border:1px solid #222;padding:4px 6px;border-radius:12px;display:flex;gap:3px;z-index:90;max-width:96vw}
.dk{width:32px;height:32px;border-radius:8px;border:1px solid #222;background:#000;color:#555;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex-shrink:0}
.dk:active{transform:scale(.9)}
.dk.on{border-color:var(--ac);color:var(--ac2);background:#7c6cf015}
.dk svg{width:14px;height:14px}
.dk-badge{position:absolute;top:-3px;right:-3px;width:12px;height:12px;background:var(--rd);border-radius:50%;font-size:7px;color:#fff;display:none;align-items:center;justify-content:center;font-weight:700}

.overlay{position:fixed;inset:0;background:#0008;z-index:94;display:none}
.overlay.show{display:block}
.pnl{position:fixed;top:0;height:100%;background:#0a0a1a;z-index:95;transition:transform .2s;display:flex;flex-direction:column;overflow:hidden}
.pnl-l{left:0;width:280px;max-width:82vw;transform:translateX(-100%);border-right:1px solid #222}
.pnl-r{right:0;width:100%;transform:translateX(100%);border-left:1px solid #222}
.pnl.open{transform:translateX(0)}
.pnl-h{padding:10px 12px;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pnl-t{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.pnl-t svg{width:13px;height:13px}
.pnl-b{flex:1;overflow-y:auto}
.xbtn{width:24px;height:24px;border-radius:5px;border:1px solid #222;background:#000;color:#666;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px}

.fi{padding:7px 12px;font-size:11px;display:flex;align-items:center;gap:7px;cursor:pointer;color:#888;border-bottom:1px solid #0a0a0a}
.fi:hover{background:#111;color:#ccc}
.fi.dir{color:var(--ac2)}
.fi svg{width:12px;height:12px;flex-shrink:0}
.fi-path{padding:5px 12px;font-size:9px;color:#444;background:#050505;border-bottom:1px solid #111}

.ed-full{width:100%;height:100%;background:#000;color:#ccc;font-family:inherit;font-size:12px;padding:10px;border:none;outline:none;resize:none;line-height:1.6}

.ai-item{padding:10px 12px;border-bottom:1px solid #111}
.ai-type{font-size:11px;font-weight:700;color:var(--rd);margin-bottom:3px}
.ai-cause{font-size:10px;color:#888;margin-bottom:5px}
.ai-fix{font-size:10px;color:#666;padding:1px 0}
.ai-btn{padding:3px 8px;background:var(--ac);border:none;color:#fff;border-radius:3px;font-size:9px;cursor:pointer;margin-top:4px;font-family:inherit}

.pi{padding:8px 12px;border-bottom:1px solid #111}
.pi-n{font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
.pi-c{font-size:9px;color:#555;margin-top:1px}
.pi-a{display:flex;gap:3px;margin-top:4px}
.pb{padding:2px 6px;border:1px solid #222;border-radius:3px;background:#000;color:#666;font-size:9px;cursor:pointer;font-family:inherit}
.pb:hover{border-color:var(--ac)}
.pb.red{border-color:var(--rd);color:var(--rd)}
.pb.grn{border-color:var(--gn);color:var(--gn)}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sd.on{background:var(--gn);box-shadow:0 0 4px var(--gn)}
.sd.off{background:var(--rd)}

.preview-frame{width:100%;height:100%;border:none;background:#fff}
.mo{position:fixed;inset:0;background:#000a;z-index:99;display:none;align-items:center;justify-content:center}
.mo.open{display:flex}
.mbox{background:#0a0a1a;border:1px solid #222;border-radius:10px;padding:16px;width:90%;max-width:360px}
.mbox h3{font-size:13px;margin-bottom:12px;color:#ccc}
.ig{margin-bottom:8px}
.ig label{display:block;font-size:10px;color:#555;margin-bottom:2px}
.ig input{width:100%;padding:6px 8px;background:#000;border:1px solid #222;border-radius:5px;color:#ccc;font-size:11px;font-family:inherit;outline:none}
.ig input:focus{border-color:var(--ac)}
.btn{padding:5px 10px;border:1px solid #222;border-radius:5px;background:#000;color:#ccc;font-size:10px;cursor:pointer;font-family:inherit}
.btn-p{background:var(--ac);border-color:var(--ac);color:#fff}

.t-line{counter-increment:line}
.t-line::before{content:counter(line);display:inline-block;width:28px;color:#222;text-align:right;margin-right:10px;font-size:10px;user-select:none;flex-shrink:0}
.t-line.t-in::before{color:#1a3a1a}
.t-line.t-err::before{color:#3a1a1a}
.t-line.t-sys::before{color:#1a1a3a}
.t-line.t-ai::before{color:#3a3a1a}
.term-scroll{counter-reset:line}
</style></head><body>
<script>
var TOKEN=localStorage.getItem('codedeck_token');
var USER=JSON.parse(localStorage.getItem('codedeck_user')||'null');
if(!TOKEN){window.location.href='/login.html';}
var origFetch=window.fetch;
window.fetch=function(url,opts){opts=opts||{};opts.headers=opts.headers||{};if(typeof opts.headers==='object'&&!(opts.headers instanceof Headers)){opts.headers['Authorization']='Bearer '+TOKEN;}return origFetch(url,opts)};
function logout(){localStorage.removeItem('codedeck_token');localStorage.removeItem('codedeck_user');window.location.href='/login.html'}
</script>

<div class="term">
<div class="term-top">
<span class="term-top-l">CodeDeck</span>
<div class="term-top-r">
<span id="uname"></span>
<button onclick="logout()">logout</button>
</div>
</div>
<div class="term-scroll" id="ts" onclick="focusInput()"></div>
</div>

<div class="dock">
<div class="dk" onclick="toggle('procs')" id="d-procs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
<div class="dk" onclick="toggle('files')" id="d-files"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></div>
<div class="dk" onclick="toggle('editor')" id="d-editor"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
<div class="dk" onclick="toggle('ai')" id="d-ai"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="6" width="16" height="14" rx="2"/><circle cx="9" cy="12" r="1.5" fill="currentColor"/><circle cx="15" cy="12" r="1.5" fill="currentColor"/><path d="M9 16h6"/><line x1="12" y1="2" x2="12" y2="6"/><circle cx="12" cy="2" r="1"/></svg><div class="dk-badge" id="ai-badge">0</div></div>
<div class="dk" onclick="toggle('preview')" id="d-preview"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
<div class="dk" onclick="toggle('ext')" id="d-ext"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>
<div class="dk" onclick="openAdd()" style="background:#7c6cf015;border-color:#7c6cf060"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--ac2)"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
</div>

<div class="overlay" id="ov" onclick="closeAll()"></div>

<div class="pnl pnl-l" id="p-procs"><div class="pnl-h"><div class="pnl-t">Processes</div><button class="xbtn" onclick="closeAll()">x</button></div><div class="pnl-b" id="procs-b"></div></div>

<div class="pnl pnl-l" id="p-files"><div class="pnl-h"><div class="pnl-t">Files</div><div style="display:flex;gap:3px"><button class="pb" onclick="newFile()">+file</button><button class="pb" onclick="newDir()">+dir</button><button class="xbtn" onclick="closeAll()">x</button></div></div><div class="fi-path" id="fpath">~</div><div class="pnl-b" id="files-b"></div></div>

<div class="pnl pnl-r" id="p-editor"><div class="pnl-h"><div class="pnl-t" id="ed-t">Editor</div><div style="display:flex;gap:3px"><button class="btn btn-p" onclick="saveF()" id="sv-btn" style="display:none">Save</button><button class="xbtn" onclick="closeAll()">x</button></div></div><div class="pnl-b" id="ed-b"><div style="padding:20px;color:#555;text-align:center;font-size:11px">Open a file from Files</div></div></div>

<div class="pnl pnl-l" id="p-ai"><div class="pnl-h"><div class="pnl-t">AI Brain</div><button class="xbtn" onclick="closeAll()">x</button></div><div class="pnl-b" id="ai-b"><div style="padding:20px;text-align:center;color:#555;font-size:11px">All clear</div></div></div>

<div class="pnl pnl-r" id="p-preview"><div class="pnl-h"><div class="pnl-t">Preview</div><div style="display:flex;gap:3px"><button class="pb" onclick="rlPv()">reload</button><button class="xbtn" onclick="closeAll()">x</button></div></div><div class="pnl-b" id="pv-b"><div style="padding:20px;text-align:center;color:#555;font-size:11px">No preview</div></div></div>

<div class="pnl pnl-l" id="p-ext"><div class="pnl-h"><div class="pnl-t">Extensions</div><button class="xbtn" onclick="closeAll()">x</button></div><div class="pnl-b" id="ext-b"></div></div>

<div class="mo" id="add-mo"><div class="mbox"><h3>New Process</h3>
<div class="ig"><label>Name</label><input type="text" id="i-n" placeholder="my-server"></div>
<div class="ig"><label>Command</label><input type="text" id="i-c" placeholder="node server.js"></div>
<div class="ig"><label>Directory</label><input type="text" id="i-d" placeholder="~/project"></div>
<div class="ig"><label>Port</label><input type="number" id="i-p" placeholder="3000"></div>
<div class="ig" style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="i-r"><label for="i-r" style="margin:0;font-size:10px">Auto-restart</label></div>
<div style="display:flex;gap:6px;margin-top:10px"><button class="btn btn-p" onclick="addP()" style="flex:1">Start</button><button class="btn" onclick="closeAdd()">Cancel</button></div></div></div>
<script>
var procs=[],errs=[],curDir='~',editPath=null,termId=null,active=null;
var hist=[],histIdx=-1,pendingFix=null;
if(USER)document.getElementById('uname').textContent=USER.name||USER.email;

var smartCmds={
'run server':'node server.js',
'run':'node server.js',
'start':'npm start',
'dev':'npm run dev',
'start dev':'npm run dev',
'install':'npm install',
'install deps':'npm install',
'deps':'npm install',
'build':'npm run build',
'test':'npm test',
'stop all':'pkill -f node',
'll':'ls -la',
'list files':'ls -la',
'go home':'cd ~',
'home':'cd ~',
'where am i':'pwd',
'whats running':'ps aux | grep node',
'disk':'df -h',
'memory':'free -h',
'ports':'netstat -tlnp 2>/dev/null || ss -tlnp',
'status':'git status',
'commit':'git add -A && git commit -m',
'push':'git push origin main',
'pull':'git pull',
'log':'git log --oneline -10',
'glog':'git log --oneline --graph --all -10',
'staged':'git diff --staged',
'unstage':'git reset HEAD',
'undo':'git checkout -- .',
'branches':'git branch -a',
'stash':'git stash',
'unstash':'git stash pop',
'remote':'git remote -v'
};

function smartInterpret(cmd){
var lower=cmd.toLowerCase().trim();
if(smartCmds[lower]!==undefined){
var mapped=smartCmds[lower];
out('> '+mapped,'t-sys');
return mapped}
return cmd}

function E(s){if(!s)return'';return String(s).replace(/\x1b\[[0-9;]*[a-zA-Z]/g,'').replace(/\u001b\[[0-9;]*[a-zA-Z]/g,'').replace(/\[\d+[a-zA-Z]/g,'').replace(/\[K/g,'').replace(/\[\?[^\n]*/g,'')}

// ═══ Terminal Output ═══
function out(text,cls){
var ts=document.getElementById('ts');
if(!text&&text!=='')return;
var clean=E(text);
var lines=clean.split('\n');
for(var i=0;i<lines.length;i++){
var line=lines[i];
var d=document.createElement('div');
d.className='t-line'+(cls?' '+cls:'');
if(line===''){
d.innerHTML='&nbsp;';
d.style.height='8px';
}else{
d.textContent=line;
d.style.lineHeight='1.6';
d.style.padding='1px 0';
}
ts.appendChild(d)}
ts.scrollTop=ts.scrollHeight}

function addPrompt(){
var ts=document.getElementById('ts');
var row=document.createElement('div');
row.className='prompt-line';
row.innerHTML='<span class="prompt-ps">$ </span><input class="prompt-input" id="tcmd" onkeydown="termKey(event)" autofocus>';
ts.appendChild(row);
ts.scrollTop=ts.scrollHeight;
setTimeout(function(){var inp=document.getElementById('tcmd');if(inp)inp.focus()},50)}

function focusInput(){var inp=document.getElementById('tcmd');if(inp)inp.focus()}

function lockInput(){
var inp=document.getElementById('tcmd');
if(!inp)return;
var val=inp.value;
inp.replaceWith(document.createTextNode(val))}

// ═══ Terminal Logic ═══
async function initTerm(){
out('CodeDeck Terminal v2.0','t-sys');
out('Type "help" for commands','t-sys');
out('','');
try{var r=await fetch('/api/terminal/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cwd:'~'})});
var d=await r.json();
if(d.success){termId=d.id;out('Shell ready ('+d.shell.split('/').pop()+')','t-sys');
try{var pr=await fetch('/api/processes');var pd=await pr.json();
var running=(pd.processes||[]).filter(function(p){return p.running});
if(running.length>0)out(running.length+' process(es) running','t-sys')}catch(e){}
out('','')}
else{out('Shell error: '+(d.error||'unknown'),'t-err')}}
catch(e){out('Cannot start shell','t-err')}
addPrompt()}

function termKey(e){
if(e.key==='Enter'){e.preventDefault();doSend();return}
if(e.key==='ArrowUp'){
e.preventDefault();
if(hist.length===0)return;
histIdx=Math.max(0,histIdx-1);
e.target.value=hist[histIdx]||'';return}
if(e.key==='ArrowDown'){
e.preventDefault();
histIdx=Math.min(hist.length,histIdx+1);
e.target.value=hist[histIdx]||'';return}
if(e.key==='y'&&pendingFix&&e.target.value===''){
e.preventDefault();
var fix=pendingFix;pendingFix=null;
lockInput();
out('$ '+fix,'t-in');
fetch('/api/terminal/'+termId+'/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:fix})});
setTimeout(function(){readOutput();setTimeout(addPrompt,300)},1000);return}
if(e.key==='Tab'){
e.preventDefault();
var v=e.target.value.trim();
if(!v)return;
var matches=Object.keys(smartCmds).filter(function(k){return k.startsWith(v)});
if(matches.length===1)e.target.value=matches[0];
else if(matches.length>1){lockInput();out(matches.join('  '),'t-sys');addPrompt()}
return}}

async function doSend(){
var inp=document.getElementById('tcmd');
if(!inp)return;
var raw=inp.value.trim();
lockInput();
if(!raw){addPrompt();return}

hist.push(raw);histIdx=hist.length;
var lower=raw.toLowerCase();

if(lower==='clear'){document.getElementById('ts').innerHTML='';addPrompt();return}
if(lower==='help'){
out('','');
out('Commands:','t-sys');
out('  clear     clear screen','t-sys');
out('  procs     processes panel','t-sys');
out('  files     files panel','t-sys');
out('  edit      editor panel','t-sys');
out('  ai        AI brain panel','t-sys');
out('  preview   preview panel','t-sys');
out('  ext       extensions','t-sys');
out('  new       new process','t-sys');
out('  logout    sign out','t-sys');
out('','');addPrompt();return}
if(lower==='procs'){toggle('procs');addPrompt();return}
if(lower==='files'){toggle('files');addPrompt();return}
if(lower==='edit'){toggle('editor');addPrompt();return}
if(lower==='ai'){toggle('ai');addPrompt();return}
if(lower==='preview'){toggle('preview');addPrompt();return}
if(lower==='ext'){toggle('ext');addPrompt();return}
if(lower==='new'){openAdd();return}
if(lower==='logout'){logout();return}

if(lower==='git status'||lower==='status'){gitCmd('status');return}
if(lower==='git log'||lower==='log'){gitCmd('log');return}
if(lower==='git diff'||lower==='diff'){gitCmd('diff');return}
if(lower==='git push'||lower==='push'){gitCmd('push');return}
if(lower==='git pull'||lower==='pull'){gitCmd('pull');return}
if(lower==='git init'||lower==='init'){gitCmd('init');return}
if(lower.startsWith('commit ')){var msg=raw.slice(7).replace(/^["']/,'').replace(/["']$/,'');gitCmd('commit',msg);return}
if(lower.startsWith('git commit -m ')){gitCmd('commit',raw.slice(14));return}
if(lower.startsWith('branch ')){gitCmd('branch',raw.slice(7));return}
if(lower.startsWith('git clone ')){gitCmd('clone',raw.slice(10));return}
if(lower==='branches'){gitCmd('branch');return}


var cmd=smartInterpret(raw);
if(lower.startsWith('cd ')){var dir=raw.slice(3).trim();if(dir==='~')gitCwd='~';else if(dir==='..')gitCwd=gitCwd.split('/').slice(0,-1).join('/')||'~';else gitCwd=gitCwd==='~'?'~/'+dir:gitCwd+'/'+dir}
if(!termId){out('No shell','t-err');addPrompt();return}
try{
await fetch('/api/terminal/'+termId+'/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:cmd})});
setTimeout(async function(){await readOutput();addPrompt()},1000)}
catch(e){out('Error','t-err');addPrompt()}}

async function readOutput(){
if(!termId)return;
try{var r=await fetch('/api/terminal/'+termId+'/output');
var d=await r.json();
if(d.output&&d.output.length){
d.output.forEach(function(o){
var clean=E(o.text).trim();
if(!clean)return;
var cls=o.type==='stderr'?'t-err':o.type==='system'?'t-sys':'t-out';
out(clean,cls);
if(o.type==='stderr')checkAI(clean);
else detectPort(clean)})}}catch(e){}}


var gitCwd='~';
async function gitCmd(action,arg){
var cwd=gitCwd;
try{var r,d;
if(action==='status'){r=await fetch('/api/git/status?cwd='+encodeURIComponent(cwd));d=await r.json();out(d.output||'Clean','t-ok')}
else if(action==='log'){r=await fetch('/api/git/log?cwd='+encodeURIComponent(cwd));d=await r.json();out(d.output||(d.success?'No commits yet':'Not a git repo'),'t-out')}
else if(action==='diff'){r=await fetch('/api/git/diff?cwd='+encodeURIComponent(cwd));d=await r.json();out(d.output||'No changes','t-out')}
else if(action==='push'){r=await fetch('/api/git/push',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cwd:cwd})});d=await r.json();out(d.output||d.error,'t-ok')}
else if(action==='pull'){r=await fetch('/api/git/pull',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cwd:cwd})});d=await r.json();out(d.output||d.error,'t-ok')}
else if(action==='commit'){
if(!arg){out('Usage: commit "your message"','t-err');addPrompt();return}
r=await fetch('/api/git/commit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:arg,cwd:cwd})}); 
d=await r.json();out(d.output||d.error||'Done',d.success?'t-ok':'t-err')}
else if(action==='branch'){
r=await fetch('/api/git/branch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:arg,cwd:cwd})}); 
d=await r.json();out(d.output||d.error,'t-ok')}
else if(action==='clone'){
if(!arg){out('Usage: clone <url>','t-err');addPrompt();return}
out('Cloning...','t-sys');
r=await fetch('/api/git/clone',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:arg})});
d=await r.json();out(d.output||d.error,d.success?'t-ok':'t-err')}
else if(action==='init'){
r=await fetch('/api/git/init',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
d=await r.json();out(d.output||d.error,'t-ok')}
}catch(e){out('Git error: '+e.message,'t-err')}
addPrompt()}

// ═══ Inline AI ═══
async function checkAI(text){
if(!text)return;
try{var r=await fetch('/api/ai/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text})});
var d=await r.json();
if(d.result&&d.result.detected){
var err=d.result;
out('','');
out('AI: '+err.type+' - '+err.cause,'t-ai');
if(err.fixes&&err.fixes.length){
err.fixes.slice(0,2).forEach(function(f){out('  '+f,'t-ai')})}
if(err.autofix){
out('','');
out('Press [y] to run: '+err.autofix,'t-ai');
pendingFix=err.autofix}
out('','')}}catch(e){}}

var lastDetectedPort=null;
function detectPort(text){
var m=text.match(/localhost:(\d{2,5})|port (\d{2,5})/i);
if(m){var port=parseInt(m[1]||m[2]);
if(port>1000&&port!==lastDetectedPort){
lastDetectedPort=port;
out('Preview ready on port '+port,'t-sys')}}}

// ═══ Panels ═══
function toggle(name){
if(active===name){closeAll();return}
closeAll();active=name;
document.getElementById('ov').classList.add('show');
document.getElementById('p-'+name).classList.add('open');
var dk=document.getElementById('d-'+name);if(dk)dk.classList.add('on');
if(name==='procs')renderP();
if(name==='files')renderF();
if(name==='ai')renderAI();
if(name==='preview')renderPV();
if(name==='ext')renderExt()}

function closeAll(){
active=null;
document.getElementById('ov').classList.remove('show');
document.querySelectorAll('.pnl').forEach(function(p){p.classList.remove('open')});
document.querySelectorAll('.dk').forEach(function(b){b.classList.remove('on')});
focusInput()}

// ═══ Processes ═══
async function fetchP(){try{var r=await fetch('/api/processes');var d=await r.json();procs=d.processes||[]}catch(e){}}
function renderP(){var el=document.getElementById('procs-b');if(!procs.length){el.innerHTML='<div style="padding:16px;text-align:center;color:#555;font-size:11px">No processes</div>';return}
el.innerHTML=procs.map(function(p){var s=p.running?'on':'off';
var a=p.running?'<button class="pb red" onclick="stopP(\''+p.name+'\')">stop</button><button class="pb" onclick="restP(\''+p.name+'\')">restart</button>':'<button class="pb grn" onclick="restP(\''+p.name+'\')">start</button>';
a+='<button class="pb" onclick="viewL(\''+p.name+'\')">logs</button>';
if(p.port&&p.running)a+='<button class="pb" onclick="openPV('+p.port+')">preview</button>';
a+='<button class="pb red" onclick="delP(\''+p.name+'\')">del</button>';
return'<div class="pi"><div class="pi-n"><span class="sd '+s+'"></span>'+p.name+'</div><div class="pi-c">'+p.command+'</div><div class="pi-a">'+a+'</div></div>'}).join('')}
async function stopP(n){await fetch('/api/processes/'+n+'/stop',{method:'POST'});await fetchP();renderP()}
async function restP(n){await fetch('/api/processes/'+n+'/restart',{method:'POST'});await fetchP();renderP()}
async function delP(n){if(!confirm('Delete '+n+'?'))return;await fetch('/api/processes/'+n,{method:'DELETE'});await fetchP();renderP()}
async function viewL(n){closeAll();try{var r=await fetch('/api/processes/'+n+'/logs');var d=await r.json();(d.logs||[]).forEach(function(l){var c=l.type==='stderr'?'t-err':l.type==='ai'?'t-ai':'t-out';out(E(l.text),c)});addPrompt()}catch(e){}}
function openAdd(){document.getElementById('add-mo').classList.add('open')}
function closeAdd(){document.getElementById('add-mo').classList.remove('open')}
async function addP(){var n=document.getElementById('i-n').value.trim(),c=document.getElementById('i-c').value.trim(),d=document.getElementById('i-d').value.trim(),p=document.getElementById('i-p').value,ar=document.getElementById('i-r').checked;if(!n||!c)return alert('Name and command required');await fetch('/api/processes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,command:c,cwd:d||undefined,port:p?parseInt(p):undefined,autoRestart:ar})});closeAdd();await fetchP();out('Started '+n,'t-ok');addPrompt()}

// ═══ Files ═══
async function renderF(){var el=document.getElementById('files-b');try{var r=await fetch('/api/files?path='+encodeURIComponent(curDir));var d=await r.json();if(d.error){el.innerHTML='<div style="padding:16px;color:var(--rd)">'+d.error+'</div>';return}document.getElementById('fpath').textContent=d.path.replace('/data/data/com.termux/files/home','~');var h='';if(d.parent)h+='<div class="fi dir" onclick="curDir=\''+d.parent+'\';renderF()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>..</div>';d.items.forEach(function(f){if(f.type==='dir')h+='<div class="fi dir" onclick="curDir=\''+f.path+'\';renderF()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>'+f.name+'</div>';else h+='<div class="fi" onclick="openF(\''+f.path+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+f.name+'</div>'});el.innerHTML=h||'<div style="padding:16px;color:#555;text-align:center">Empty</div>'}catch(e){}}
async function newFile(){var n=prompt('File name:');if(!n)return;await fetch('/api/files/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:curDir+'/'+n,type:'file'})});renderF()}
async function newDir(){var n=prompt('Folder name:');if(!n)return;await fetch('/api/files/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:curDir+'/'+n,type:'dir'})});renderF()}

// ═══ Editor ═══
async function openF(p){editPath=p;closeAll();toggle('editor');try{var r=await fetch('/api/files/read?path='+encodeURIComponent(p));var d=await r.json();if(d.error){document.getElementById('ed-b').innerHTML='<div style="padding:16px;color:var(--rd)">'+d.error+'</div>';return}document.getElementById('ed-t').textContent=d.path.replace('/data/data/com.termux/files/home','~');document.getElementById('sv-btn').style.display='block';document.getElementById('ed-b').innerHTML='<textarea class="ed-full" id="ed-a">'+E(d.content)+'</textarea>'}catch(e){}}
async function saveF(){if(!editPath)return;var c=document.getElementById('ed-a').value;try{var r=await fetch('/api/files/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:editPath,content:c})});var d=await r.json();if(d.success){var b=document.getElementById('sv-btn');b.textContent='Saved!';b.style.background='var(--gn)';setTimeout(function(){b.textContent='Save';b.style.background=''},1500)}}catch(e){}}

// ═══ AI ═══
async function fetchAI(){try{var r=await fetch('/api/ai/errors');var d=await r.json();errs=d.errors||[];var b=document.getElementById('ai-badge');b.textContent=errs.length;b.style.display=errs.length>0?'flex':'none'}catch(e){}}
function renderAI(){var el=document.getElementById('ai-b');if(!errs.length){el.innerHTML='<div style="padding:20px;text-align:center;color:#555;font-size:11px">All clear</div>';return}el.innerHTML=errs.map(function(e){var fx=(e.fixes||[]).map(function(f){return'<div class="ai-fix">'+f+'</div>'}).join('');return'<div class="ai-item"><div class="ai-type">'+e.type+'</div><div class="ai-cause">'+e.cause+'</div>'+fx+'</div>'}).join('')}

// ═══ Preview ═══
function renderPV(){var el=document.getElementById('pv-b');var running=procs.filter(function(p){return p.port&&p.running});if(!running.length){el.innerHTML='<div style="padding:20px;text-align:center;color:#555;font-size:11px">No preview</div>';return}el.innerHTML='<iframe class="preview-frame" src="http://localhost:'+running[0].port+'"></iframe>'}
function openPV(port){closeAll();toggle('preview');document.getElementById('pv-b').innerHTML='<iframe class="preview-frame" src="http://localhost:'+port+'"></iframe>'}
function rlPv(){var f=document.querySelector('.preview-frame');if(f)f.src=f.src}

// ═══ Extensions ═══
async function renderExt(){var el=document.getElementById('ext-b');try{var r=await fetch('/api/extensions');var d=await r.json();var exts=d.extensions||[];el.innerHTML=exts.map(function(e){var cmds=Object.keys(e.commands||{}).map(function(k){return'<span style="display:inline-block;padding:1px 5px;background:#111;border:1px solid #222;border-radius:3px;font-size:8px;margin:1px">'+k+'</span>'}).join('');return'<div style="padding:8px 12px;border-bottom:1px solid #111"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div style="width:20px;height:20px;background:'+e.color+'22;border:1px solid '+e.color+'44;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:'+e.color+'">'+e.icon+'</div><div style="font-size:10px;font-weight:700">'+e.name+'</div></div><div style="display:flex;flex-wrap:wrap;gap:1px">'+cmds+'</div></div>'}).join('')}catch(e){}}
async function loadExtCmds(){try{var r=await fetch('/api/extensions/commands');var d=await r.json();var cmds=d.commands||{};Object.keys(cmds).forEach(function(k){smartCmds[k]=cmds[k].command})}catch(e){}}

// ═══ Init ═══
document.addEventListener('DOMContentLoaded',function(){
initTerm();
fetchP();
fetchAI();
loadExtCmds();
setInterval(function(){fetchP();fetchAI()},8000);
document.getElementById('add-mo').addEventListener('click',function(e){if(e.target===e.currentTarget)closeAdd()})});
</script>
