<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>CodeDeck</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050510;--sf:#0a0a1a;--bd:#151530;--tx:#d4d4e8;--tx2:#555;--ac:#7c6cf0;--ac2:#b4a8ff;--gn:#10b981;--rd:#ef4444;--yw:#eab308}
html,body{margin:0;padding:0;width:100%;max-width:100vw;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;height:100vh;height:100dvh;display:flex;flex-direction:column}

.term-root{flex:1;display:flex;flex-direction:column;min-height:0}
.term-header{height:38px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.term-title{font-size:12px;color:var(--gn);flex:1;font-weight:700}
.term-user{font-size:10px;color:var(--tx2)}
.term-logout{padding:2px 8px;background:none;border:1px solid var(--bd);border-radius:4px;color:var(--tx2);font-size:9px;cursor:pointer;font-family:inherit}

.term-body{flex:1;overflow-y:auto;padding:10px 12px 60px 12px;font-size:13px;line-height:1.8;background:var(--bg);min-height:0;cursor:text}
.term-body span{display:inline}
.t-in{color:var(--gn)}
.term-line{display:flex;align-items:center}
.term-line .ps{color:var(--gn);margin-right:6px;flex-shrink:0}
.term-line input{background:none;border:none;color:var(--tx);font-size:13px;font-family:inherit;outline:none;flex:1;padding:0;caret-color:var(--gn)}
.term-cursor{display:inline-block;width:7px;height:15px;background:var(--gn);animation:blink 1s infinite;vertical-align:middle;margin-left:1px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.t-out{color:#aaa}
.t-err{color:var(--rd)}
.t-sys{color:#0984e3}
.t-ai{color:var(--yw)}





.dock{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);background:#0a0a1aee;backdrop-filter:blur(10px);border:1px solid var(--bd);padding:4px 6px;border-radius:12px;display:flex;gap:3px;z-index:90;max-width:96vw}
.dk{width:34px;height:34px;border-radius:8px;border:1px solid var(--bd);background:var(--bg);color:var(--tx2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex-shrink:0}
.dk:active{transform:scale(.9)}
.dk.on{border-color:var(--ac);color:var(--ac2);background:#7c6cf015}
.dk svg{width:15px;height:15px}
.dk-badge{position:absolute;top:-3px;right:-3px;width:13px;height:13px;background:var(--rd);border-radius:50%;font-size:7px;color:#fff;display:none;align-items:center;justify-content:center;font-weight:700}

.overlay{position:fixed;inset:0;background:#0008;z-index:94;display:none}
.overlay.show{display:block}
.pnl{position:fixed;top:0;height:100%;background:var(--sf);z-index:95;transition:transform .2s;display:flex;flex-direction:column;overflow:hidden}
.pnl-l{left:0;width:280px;max-width:82vw;transform:translateX(-100%);border-right:1px solid var(--bd)}
.pnl-r{right:0;width:100%;transform:translateX(100%);border-left:1px solid var(--bd)}
.pnl.open{transform:translateX(0)}
.pnl-h{padding:10px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pnl-t{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.pnl-t svg{width:13px;height:13px}
.pnl-b{flex:1;overflow-y:auto}
.xbtn{width:26px;height:26px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);color:var(--tx2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.xbtn:hover{border-color:var(--rd);color:var(--rd)}

.fi{padding:8px 12px;font-size:11px;display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--tx2);border-bottom:1px solid #0a0a14}
.fi:hover{background:var(--bd);color:var(--tx)}
.fi.dir{color:var(--ac2)}
.fi svg{width:13px;height:13px;flex-shrink:0}
.fi-path{padding:6px 12px;font-size:10px;color:var(--tx2);background:var(--bg);border-bottom:1px solid var(--bd)}

.ed-full{width:100%;height:100%;background:var(--bg);color:var(--tx);font-family:inherit;font-size:12px;padding:12px;border:none;outline:none;resize:none;line-height:1.7}
.ed-bar{padding:6px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--bg);font-size:10px;color:var(--tx2)}

.ai-item{padding:10px 12px;border-bottom:1px solid var(--bd)}
.ai-type{font-size:11px;font-weight:700;color:var(--rd);margin-bottom:3px}
.ai-cause{font-size:10px;color:var(--tx2);margin-bottom:5px}
.ai-fix{font-size:10px;color:var(--tx2);padding:1px 0}
.ai-btn{padding:3px 8px;background:var(--ac);border:none;color:#fff;border-radius:4px;font-size:9px;cursor:pointer;margin-top:4px;font-family:inherit}

.pi{padding:8px 12px;border-bottom:1px solid var(--bd)}
.pi-n{font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
.pi-c{font-size:9px;color:var(--tx2);margin-top:1px}
.pi-a{display:flex;gap:3px;margin-top:5px}
.pb{padding:2px 6px;border:1px solid var(--bd);border-radius:3px;background:var(--bg);color:var(--tx2);font-size:9px;cursor:pointer;font-family:inherit}
.pb:hover{border-color:var(--ac)}
.pb.red{border-color:var(--rd);color:var(--rd)}
.pb.grn{border-color:var(--gn);color:var(--gn)}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sd.on{background:var(--gn);box-shadow:0 0 4px var(--gn)}
.sd.off{background:var(--rd)}

.preview-frame{width:100%;height:100%;border:none;background:#fff}

.mo{position:fixed;inset:0;background:#000a;z-index:99;display:none;align-items:center;justify-content:center}
.mo.open{display:flex}
.mbox{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px;width:90%;max-width:360px}
.mbox h3{font-size:13px;margin-bottom:12px}
.ig{margin-bottom:8px}
.ig label{display:block;font-size:10px;color:var(--tx2);margin-bottom:2px}
.ig input{width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-size:11px;font-family:inherit;outline:none}
.ig input:focus{border-color:var(--ac)}
.btn{padding:5px 10px;border:1px solid var(--bd);border-radius:5px;background:var(--bg);color:var(--tx);font-size:10px;cursor:pointer;font-family:inherit}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--ac);border-color:var(--ac);color:#fff}
.term-input-bar{display:flex;align-items:center;background:#0a0a14;border-top:1px solid var(--bd);flex-shrink:0}
.term-ps1{padding:10px;color:var(--gn);font-size:13px;font-weight:700}
.term-in{flex:1;padding:10px;background:none;border:none;color:var(--tx);font-size:13px;font-family:inherit;outline:none}
</style></head><body>
<script>
var TOKEN=localStorage.getItem('codedeck_token');
var USER=JSON.parse(localStorage.getItem('codedeck_user')||'null');
if(!TOKEN){window.location.href='/login.html';}
var origFetch=window.fetch;
window.fetch=function(url,opts){opts=opts||{};opts.headers=opts.headers||{};if(typeof opts.headers==='object'&&!(opts.headers instanceof Headers)){opts.headers['Authorization']='Bearer '+TOKEN;}return origFetch(url,opts)};
function logout(){localStorage.removeItem('codedeck_token');localStorage.removeItem('codedeck_user');window.location.href='/login.html'}
</script>

<div class="term-root">
<div class="term-header">
<span class="term-title">CodeDeck</span>
<span class="term-user" id="uname"></span>

</div>

</div>

<div class="dock">

<div class="dk" onclick="openAdd()" id="d-add" style="background:#7c6cf015;border-color:#7c6cf060"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--ac2)"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
</div>

<div class="overlay" id="ov" onclick="closeAll()"></div>

<div class="pnl pnl-l" id="p-procs"><div class="pnl-h"><div class="pnl-t"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Processes</div><button class="xbtn" onclick="closeAll()">x</button></div><div class="pnl-b" id="procs-b"></div></div>

<div class="pnl pnl-l" id="p-files"><div class="pnl-h"><div class="pnl-t"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Files</div><div style="display:flex;gap:3px"><button class="pb" onclick="newFile()">+file</button><button class="pb" onclick="newDir()">+dir</button><button class="xbtn" onclick="closeAll()">x</button></div></div><div class="fi-path" id="fpath">~</div><div class="pnl-b" id="files-b"></div></div>

<div class="pnl pnl-r" id="p-editor"><div class="pnl-h"><div class="pnl-t" id="ed-t"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editor</div><div style="display:flex;gap:3px"><button class="btn btn-p" onclick="saveF()" id="sv-btn" style="display:none">Save</button><button class="xbtn" onclick="closeAll()">x</button></div></div><div class="pnl-b" id="ed-b"><div style="padding:20px;color:var(--tx2);text-align:center;font-size:11px">Open a file from Files</div></div></div>

<div class="pnl pnl-l" id="p-ai"><div class="pnl-h"><div class="pnl-t"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="6" width="16" height="14" rx="2"/><circle cx="9" cy="12" r="1.5" fill="currentColor"/><circle cx="15" cy="12" r="1.5" fill="currentColor"/><path d="M9 16h6"/><line x1="12" y1="2" x2="12" y2="6"/><circle cx="12" cy="2" r="1"/></svg>AI Brain</div><button class="xbtn" onclick="closeAll()">x</button></div><div class="pnl-b" id="ai-b"><div style="padding:20px;text-align:center;color:var(--tx2);font-size:11px">All clear</div></div></div>

<div class="pnl pnl-r" id="p-preview"><div class="pnl-h"><div class="pnl-t"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Preview</div><div style="display:flex;gap:3px"><button class="pb" onclick="rlPv()">reload</button><button class="xbtn" onclick="closeAll()">x</button></div></div><div class="pnl-b" id="pv-b"><div style="padding:20px;text-align:center;color:var(--tx2);font-size:11px">No preview available</div></div></div>


<div class="pnl pnl-l" id="p-ext"><div class="pnl-h"><div class="pnl-t"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Extensions</div><button class="xbtn" onclick="closeAll()">x</button></div><div class="pnl-b" id="ext-b"></div></div>

<div class="mo" id="add-mo"><div class="mbox"><h3>New Process</h3>
<div class="ig"><label>Name</label><input type="text" id="i-n" placeholder="my-server"></div>
<div class="ig"><label>Command</label><input type="text" id="i-c" placeholder="node server.js"></div>
<div class="ig"><label>Directory</label><input type="text" id="i-d" placeholder="~/project"></div>
<div class="ig"><label>Port</label><input type="number" id="i-p" placeholder="3000"></div>
<div class="ig" style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="i-r"><label for="i-r" style="margin:0;font-size:10px">Auto-restart</label></div>
<div style="display:flex;gap:6px;margin-top:10px"><button class="btn btn-p" onclick="addP()" style="flex:1">Start</button><button class="btn" onclick="closeAdd()">Cancel</button></div></div></div>
<script>
var procs=[],errs=[],curDir='~',editPath=null,termId=null,active=null;
var hist=[],histIdx=-1;
if(USER)document.getElementById('uname').textContent=USER.name||USER.email;


var smartCmds={
'run server':'node server.js',
'run':'node server.js',
'start':'npm start',
'dev':'npm run dev',
'start dev':'npm run dev',
'install':'npm install',
'install deps':'npm install',
'deps':'npm install',
'build':'npm run build',
'test':'npm test',
'stop all':'pkill -f node',
'list files':'ls -la',
'll':'ls -la',
'go home':'cd ~',
'home':'cd ~',
'where am i':'pwd',
'whats running':'ps aux | grep node',
'disk':'df -h',
'memory':'free -h',
'processes':'ps aux',
'ports':'netstat -tlnp 2>/dev/null || ss -tlnp'
};

function smartInterpret(cmd){
var lower=cmd.toLowerCase().trim();
if(smartCmds[lower]!==undefined){
var mapped=smartCmds[lower];
w('→ '+mapped+'\n','t-sys');
return mapped}
return cmd}

function E(s){if(!s)return'';s=String(s).replace(/\x1b\[[0-9;]*[a-zA-Z]/g,'').replace(/\u001b\[[0-9;]*[a-zA-Z]/g,'').replace(/\[\d+[a-zA-Z]/g,'').replace(/\[K/g,'').replace(/\[\?\d+[a-zA-Z]/g,'').replace(/\]\d+;[^\x07]*\x07/g,'');var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function w(t,c){
var o=document.getElementById('tout');
if(!t||t==='')return;
var lines=t.split('\n');
for(var i=0;i<lines.length;i++){
var line=lines[i];
if(line===''&&i===lines.length-1)continue;
var d=document.createElement('div');
d.style.padding='0';
d.style.margin='0';
d.style.minHeight='1.2em';
d.style.whiteSpace='pre-wrap';
d.style.wordBreak='break-all';
if(c)d.className=c;
d.textContent=line;
o.appendChild(d)}
o.scrollTop=o.scrollHeight}

// ═══ Terminal ═══
async function initTerm(){
if(termId)return;
w('CodeDeck Terminal v2.0\n','t-sys');
w('Type "help" for commands\n\n','t-sys');
try{var r=await fetch('/api/terminal/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cwd:'~'})});
var d=await r.json();
if(d.success){termId=d.id;w('Shell ready ('+d.shell.split('/').pop()+')\n','t-sys');
fetch('/api/processes').then(function(r){return r.json()}).then(function(pd){
var running=(pd.processes||[]).filter(function(p){return p.running});
if(running.length>0)w(running.length+' process(es) already running\n','t-sys')});
fetch('/api/files/read?path='+encodeURIComponent('~/termuxpilot/package.json'),{}).then(function(r){return r.json()}).then(function(pj){
if(!pj.error){try{var pkg=JSON.parse(pj.content||'{}');w('Project: '+(pkg.name||'unknown')+' v'+(pkg.version||'?')+'\n','t-sys')}catch(e){}}})
w('','');addPrompt()}
else{w('Terminal error: '+(d.error||'unknown')+'\n','t-err')}}
catch(e){w('Cannot connect to terminal\n','t-err')}}



async function checkInlineAI(text){
if(!text)return;
try{var r=await fetch('/api/ai/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text})});
var d=await r.json();
if(d.result&&d.result.detected){
var err=d.result;
w('','');
w('AI: '+err.type+' - '+err.cause,'t-ai');
w('','');
if(err.fixes&&err.fixes.length){
w('Fixes:','t-ai');
err.fixes.slice(0,2).forEach(function(f){w('  '+f,'t-ai')})}
if(err.autofix){
w('','');
w('Press [y] to run: '+err.autofix,'t-ai');
pendingFix=err.autofix}
w('','')}
}catch(e){}}

var pendingFix=null;

var lastDetectedPort=null;
function detectPort(text){
var m=text.match(/localhost:(\d{2,5})|port (\d{2,5})|:(\d{2,5})/i);
if(m){
var port=parseInt(m[1]||m[2]||m[3]);
if(port>1000&&port!==lastDetectedPort){
lastDetectedPort=port;
w('Preview ready on port '+port+' - open Preview panel','t-sys');
var pv=document.getElementById('d-preview');
if(pv){pv.style.borderColor='var(--gn)';pv.style.background='#10b98115'}}}}


function termKey(e){
if(e.key==='Enter'){send();return}
if(e.key==='y'&&pendingFix&&e.target.value===''){
e.preventDefault();
var fix=pendingFix;pendingFix=null;
w('$ '+fix+'\n','t-in');
fetch('/api/terminal/'+termId+'/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:fix})});
setTimeout(function(){readOutput();setTimeout(addPrompt,300)},1000);
return}
if(e.key==='ArrowUp'){
e.preventDefault();
if(hist.length===0)return;
histIdx=Math.max(0,histIdx-1);
e.target.value=hist[histIdx]||'';
return}
if(e.key==='ArrowDown'){
e.preventDefault();
histIdx=Math.min(hist.length,histIdx+1);
e.target.value=hist[histIdx]||'';
return}
if(e.key==='Tab'){
e.preventDefault();
var v=e.target.value.trim();
if(!v)return;
var matches=Object.keys(smartCmds).filter(function(k){return k.startsWith(v)});
if(matches.length===1)e.target.value=matches[0];
else if(matches.length>1){w('\n'+matches.join('  ')+'\n','t-sys');addPrompt()}
return}}

function addPrompt(){
var o=document.getElementById('tout');
var last=o.lastElementChild;
if(last&&last.textContent==='$')return;
var d=document.createElement('div');
d.className='t-in';
d.textContent='$';
d.style.padding='0';d.style.margin='4px 0 0 0';
o.appendChild(d);
o.scrollTop=o.scrollHeight}

async function send(){
var input=document.getElementById('tcmd');
var raw=input.value.trim();
if(!raw)return;
input.value='';
hist.push(raw);histIdx=hist.length;

var lower=raw.toLowerCase();
if(lower==='clear'){document.getElementById('tout').innerHTML='';addPrompt();return}
if(lower==='help'){w('\nCodeDeck Commands:','t-sys');w('  clear     clear screen','t-sys');w('  procs     open processes','t-sys');w('  files     open files','t-sys');w('  edit      open editor','t-sys');w('  ai        open AI brain','t-sys');w('  preview   open preview','t-sys');w('  new       new process','t-sys');w('  logout    sign out','t-sys');w('','');addPrompt();return}
if(lower==='procs'){toggle('procs');return}
if(lower==='files'){toggle('files');return}
if(lower==='edit'){toggle('editor');return}
if(lower==='ai'){toggle('ai');return}
if(lower==='preview'){toggle('preview');return}
if(lower==='new'){openAdd();return}
if(lower==='logout'){logout();return}

var cmd=smartInterpret(raw);
w('$ '+raw,'t-in');

if(!termId){w('No shell session','t-err');addPrompt();return}
try{
await fetch('/api/terminal/'+termId+'/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:cmd})});
setTimeout(async function(){
await readOutput();
addPrompt()},1200)}
catch(e){w('Error','t-err');addPrompt()}}

var lastTime=null;
async function readOutput(){
var got=false;
if(!termId)return;
try{var url='/api/terminal/'+termId+'/output';
if(lastTime)url+='?since='+encodeURIComponent(lastTime);
var r=await fetch(url);var d=await r.json();
if(d.output&&d.output.length){
d.output.forEach(function(o){
lastTime=o.time;
var cls=o.type==='stderr'?'t-err':o.type==='system'?'t-sys':'t-out';
var clean=o.text.replace(/\x1b\[[0-9;]*[a-zA-Z]/g,'').replace(/\[K/g,'').replace(/\[\?\d+[a-zA-Z]/g,'').replace(/\]\d+;[^\x07]*\x07/g,'').trim();if(clean){w(clean+'\n',cls);got=true;if(cls==='t-err')checkInlineAI(clean);else detectPort(clean)}})}
return got}catch(e){return false}}

// ═══ Panels ═══
function toggle(name){
if(active===name){closeAll();return}
closeAll();
active=name;
document.getElementById('ov').classList.add('show');
document.getElementById('p-'+name).classList.add('open');
document.getElementById('d-'+name).classList.add('on');
if(name==='procs')renderP();
if(name==='files')renderF();
if(name==='ai')renderAI();
if(name==='preview')renderPV();
if(name==='ext')renderExt()}

function closeAll(){
active=null;
document.getElementById('ov').classList.remove('show');
document.querySelectorAll('.pnl').forEach(function(p){p.classList.remove('open')});
document.querySelectorAll('.dk').forEach(function(b){b.classList.remove('on')});
setTimeout(function(){document.getElementById('tcmd').focus()},100)}

// ═══ Processes ═══
async function fetchP(){try{var r=await fetch('/api/processes');var d=await r.json();procs=d.processes||[]}catch(e){}}
function renderP(){
var el=document.getElementById('procs-b');
if(!procs.length){el.innerHTML='<div style="padding:16px;text-align:center;color:var(--tx2);font-size:11px">No processes</div>';return}
el.innerHTML=procs.map(function(p){
var s=p.running?'on':'off';
var a=p.running
?'<button class="pb red" onclick="stopP(\''+E(p.name)+'\')">stop</button><button class="pb" onclick="restP(\''+E(p.name)+'\')">restart</button>'
:'<button class="pb grn" onclick="restP(\''+E(p.name)+'\')">start</button>';
a+='<button class="pb" onclick="viewL(\''+E(p.name)+'\')">logs</button>';
if(p.port&&p.running)a+='<button class="pb" onclick="openPV('+p.port+')">preview</button>';
a+='<button class="pb red" onclick="delP(\''+E(p.name)+'\')">del</button>';
return'<div class="pi"><div class="pi-n"><span class="sd '+s+'"></span>'+E(p.name)+'</div><div class="pi-c">'+E(p.command)+'</div><div class="pi-a">'+a+'</div></div>'}).join('')}

async function stopP(n){await fetch('/api/processes/'+n+'/stop',{method:'POST'});await fetchP();renderP();w('Stopped '+n+'\n','t-sys')}
async function restP(n){await fetch('/api/processes/'+n+'/restart',{method:'POST'});await fetchP();renderP();w('Restarted '+n+'\n','t-ok')}
async function delP(n){if(!confirm('Delete '+n+'?'))return;await fetch('/api/processes/'+n,{method:'DELETE'});await fetchP();renderP();w('Removed '+n+'\n','t-sys')}
async function viewL(n){closeAll();try{var r=await fetch('/api/processes/'+n+'/logs');var d=await r.json();var logs=d.logs||[];w('\n--- '+n+' logs ---\n','t-sys');logs.forEach(function(l){var c=l.type==='stderr'?'t-err':l.type==='ai'?'t-ai':'t-out';w(E(l.text)+'\n',c)});w('--- end ---\n\n','t-sys')}catch(e){}}

function openAdd(){document.getElementById('add-mo').classList.add('open')}
function closeAdd(){document.getElementById('add-mo').classList.remove('open')}
async function addP(){
var n=document.getElementById('i-n').value.trim(),c=document.getElementById('i-c').value.trim(),d=document.getElementById('i-d').value.trim(),p=document.getElementById('i-p').value,ar=document.getElementById('i-r').checked;
if(!n||!c)return alert('Name and command required');
await fetch('/api/processes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,command:c,cwd:d||undefined,port:p?parseInt(p):undefined,autoRestart:ar})});
closeAdd();await fetchP();w('Started '+n+'\n','t-ok')}

// ═══ Files ═══
async function renderF(){
var el=document.getElementById('files-b');
try{var r=await fetch('/api/files?path='+encodeURIComponent(curDir));var d=await r.json();
if(d.error){el.innerHTML='<div style="padding:16px;color:var(--rd);font-size:11px">'+E(d.error)+'</div>';return}
var short=d.path.replace('/data/data/com.termux/files/home','~');
document.getElementById('fpath').textContent=short;
var h='';
if(d.parent)h+='<div class="fi dir" onclick="curDir=\''+E(d.parent)+'\';renderF()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>..</div>';
d.items.forEach(function(f){
if(f.type==='dir')h+='<div class="fi dir" onclick="curDir=\''+E(f.path)+'\';renderF()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>'+E(f.name)+'</div>';
else h+='<div class="fi" onclick="openF(\''+E(f.path)+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+E(f.name)+'</div>'});
el.innerHTML=h||'<div style="padding:16px;color:var(--tx2);text-align:center;font-size:11px">Empty</div>'}catch(e){el.innerHTML='<div style="padding:16px;color:var(--rd)">Error</div>'}}

async function newFile(){var n=prompt('File name:');if(!n)return;await fetch('/api/files/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:curDir+'/'+n,type:'file'})});renderF()}
async function newDir(){var n=prompt('Folder name:');if(!n)return;await fetch('/api/files/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:curDir+'/'+n,type:'dir'})});renderF()}

// ═══ Editor ═══
async function openF(p){
editPath=p;closeAll();toggle('editor');
try{var r=await fetch('/api/files/read?path='+encodeURIComponent(p));var d=await r.json();
if(d.error){document.getElementById('ed-b').innerHTML='<div style="padding:16px;color:var(--rd);font-size:11px">'+E(d.error)+'</div>';return}
var short=d.path.replace('/data/data/com.termux/files/home','~');
document.getElementById('ed-t').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'+E(short);
document.getElementById('sv-btn').style.display='block';
document.getElementById('ed-b').innerHTML='<textarea class="ed-full" id="ed-a">'+E(d.content)+'</textarea>';
document.getElementById('ed-a').addEventListener('keydown',function(e){if(e.key==='Tab'){e.preventDefault();var s=this.selectionStart,en=this.selectionEnd;this.value=this.value.substring(0,s)+'  '+this.value.substring(en);this.selectionStart=this.selectionEnd=s+2}})}catch(e){}}

async function saveF(){
if(!editPath)return;var c=document.getElementById('ed-a').value;
try{var r=await fetch('/api/files/write',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:editPath,content:c})});
var d=await r.json();if(d.success){var b=document.getElementById('sv-btn');b.textContent='Saved!';b.style.background='var(--gn)';setTimeout(function(){b.textContent='Save';b.style.background=''},1500);w('Saved '+editPath.split('/').pop()+'\n','t-ok')}}catch(e){}}

// ═══ AI ═══
async function fetchAI(){
try{var r=await fetch('/api/ai/errors');var d=await r.json();errs=d.errors||[];
var b=document.getElementById('ai-badge');b.textContent=errs.length;b.style.display=errs.length>0?'flex':'none'}catch(e){}}

function renderAI(){
var el=document.getElementById('ai-b');
if(!errs.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--tx2);font-size:11px">All clear. AI is watching.</div>';return}
el.innerHTML=errs.map(function(e){
var fx=(e.fixes||[]).map(function(f){return'<div class="ai-fix">'+E(f)+'</div>'}).join('');
return'<div class="ai-item"><div class="ai-type">'+E(e.type)+' <span style="float:right;font-size:9px;color:var(--tx2)">'+e.severity+'</span></div><div class="ai-cause">'+E(e.cause)+'</div>'+fx+(e.canAutoFix?'<button class="ai-btn" onclick="healE(\''+encodeURIComponent(JSON.stringify(e))+'\')">Fix</button>':'')+'<button class="ai-btn" style="background:var(--ac);margin-left:3px" onclick="explE(\''+encodeURIComponent(JSON.stringify(e))+'\')">Explain</button></div>'}).join('')}

async function healE(ed){try{var err=JSON.parse(decodeURIComponent(ed));var r=await fetch('/api/ai/heal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({error:err})});var d=await r.json();w('\nAI: '+(d.message||'Fix applied')+'\n','t-ai');fetchP();fetchAI()}catch(e){}}
async function explE(ed){try{var err=JSON.parse(decodeURIComponent(ed));var r=await fetch('/api/ai/explain',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({error:err})});var d=await r.json();w('\n'+d.explanation+'\n\n','t-ai')}catch(e){}}

// ═══ Preview ═══
function renderPV(){
var el=document.getElementById('pv-b');
var running=procs.filter(function(p){return p.port&&p.running});
if(!running.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--tx2);font-size:11px">No preview. Start a process with a port.</div>';return}
el.innerHTML='<iframe class="preview-frame" src="http://localhost:'+running[0].port+'"></iframe>'}
function openPV(port){closeAll();toggle('preview');document.getElementById('pv-b').innerHTML='<iframe class="preview-frame" src="http://localhost:'+port+'"></iframe>'}
function rlPv(){var f=document.querySelector('.preview-frame');if(f)f.src=f.src}

// ═══ Init ═══

async function renderExt(){
var el=document.getElementById('ext-b');
try{var r=await fetch('/api/extensions');var d=await r.json();var exts=d.extensions||[];
el.innerHTML=exts.map(function(e){
var cmds=Object.keys(e.commands||{}).map(function(k){return'<span style="display:inline-block;padding:1px 6px;background:var(--bg);border:1px solid var(--bd);border-radius:3px;font-size:9px;margin:2px">'+k+'</span>'}).join('');
return'<div style="padding:10px 12px;border-bottom:1px solid var(--bd)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:24px;height:24px;background:'+e.color+'22;border:1px solid '+e.color+'44;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:'+e.color+'">'+e.icon+'</div><div><div style="font-size:11px;font-weight:700">'+e.name+'</div><div style="font-size:9px;color:var(--tx2)">'+e.desc+'</div></div></div><div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:2px">'+cmds+'</div></div>'}).join('')}catch(e){el.innerHTML='<div style="padding:16px;color:var(--rd)">Error</div>'}}

async function loadExtCmds(){
try{var r=await fetch('/api/extensions/commands');var d=await r.json();var cmds=d.commands||{};
Object.keys(cmds).forEach(function(k){
smartCmds[k]=cmds[k].command})}catch(e){}}

document.addEventListener('DOMContentLoaded',function(){
document.getElementById('tout').addEventListener('click',function(){var i=document.getElementById('tcmd');if(i)i.focus()});
initTerm();
loadExtCmds();
fetchP();
fetchAI();
setInterval(function(){fetchP();fetchAI()},8000);
document.getElementById('add-mo').addEventListener('click',function(e){if(e.target===e.currentTarget)closeAdd()})});
</script>
