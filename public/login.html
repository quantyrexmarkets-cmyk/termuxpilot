<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TermuxPilot - Login</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#e0e0e8;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-box{width:90%;max-width:380px;background:#111122;border:1px solid #1e1e3a;border-radius:14px;padding:30px 24px}
.logo{text-align:center;margin-bottom:24px}
.logo svg{width:40px;height:40px;color:#a29bfe;margin-bottom:8px}
.logo h1{font-size:20px;font-weight:700}
.logo p{font-size:12px;color:#666;margin-top:4px}
.ig{margin-bottom:14px}
.ig label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.ig input{width:100%;padding:10px 12px;background:#0a0a14;border:1px solid #1e1e3a;border-radius:8px;color:#e0e0e8;font-size:14px;outline:none}
.ig input:focus{border-color:#6c5ce7}
.btn{width:100%;padding:12px;background:#6c5ce7;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.6}
.switch{text-align:center;margin-top:16px;font-size:13px;color:#666}
.switch a{color:#a29bfe;cursor:pointer;text-decoration:none}
.switch a:hover{text-decoration:underline}
.err{background:#ff444422;border:1px solid #ff444444;border-radius:8px;padding:8px 12px;font-size:12px;color:#ff4444;margin-bottom:12px;display:none}
.name-field{display:none}
</style></head><body>
<div class="auth-box">
<div class="logo">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
<h1>TermuxPilot</h1>
<p id="auth-subtitle">Sign in to your workspace</p>
</div>
<div class="err" id="err"></div>
<div class="ig name-field" id="name-group">
<label>Name</label>
<input type="text" id="i-name" placeholder="Your name">
</div>
<div class="ig">
<label>Email</label>
<input type="email" id="i-email" placeholder="you@example.com">
</div>
<div class="ig">
<label>Password</label>
<input type="password" id="i-pass" placeholder="Min 6 characters">
</div>
<button class="btn" id="auth-btn" onclick="doAuth()">Sign In</button>
<div class="switch">
<span id="switch-text">No account?</span>
<a id="switch-link" onclick="toggleMode()">Create one</a>
</div>
</div>
<script>
let mode='login';

function toggleMode(){
  mode=mode==='login'?'register':'login';
  document.getElementById('name-group').style.display=mode==='register'?'block':'none';
  document.getElementById('auth-btn').textContent=mode==='register'?'Create Account':'Sign In';
  document.getElementById('switch-text').textContent=mode==='register'?'Have an account?':'No account?';
  document.getElementById('switch-link').textContent=mode==='register'?'Sign in':'Create one';
  document.getElementById('auth-subtitle').textContent=mode==='register'?'Create your workspace':'Sign in to your workspace';
  hideErr();
}

function showErr(msg){
  const el=document.getElementById('err');
  el.textContent=msg;el.style.display='block';
}
function hideErr(){document.getElementById('err').style.display='none';}

async function doAuth(){
  hideErr();
  const email=document.getElementById('i-email').value.trim();
  const pass=document.getElementById('i-pass').value;
  const name=document.getElementById('i-name').value.trim();
  const btn=document.getElementById('auth-btn');

  if(!email||!pass)return showErr('Email and password required');
  if(mode==='register'&&pass.length<6)return showErr('Password must be at least 6 characters');

  btn.disabled=true;
  btn.textContent=mode==='register'?'Creating...':'Signing in...';

  try{
    const url=mode==='register'?'/api/auth/register':'/api/auth/login';
    const body=mode==='register'?{email,password:pass,name:name||undefined}:{email,password:pass};
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();

    if(d.error){showErr(d.error);btn.disabled=false;btn.textContent=mode==='register'?'Create Account':'Sign In';return}

    if(d.token){
      localStorage.setItem('pilot_token',d.token);
      localStorage.setItem('pilot_user',JSON.stringify(d.user));
      window.location.href='/';
    }
  }catch(e){
    showErr('Connection error');
    btn.disabled=false;
    btn.textContent=mode==='register'?'Create Account':'Sign In';
  }
}

// Auto-login check
if(localStorage.getItem('pilot_token')){window.location.href='/';}

// Enter key
document.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth()});
</script>
</body></html>
